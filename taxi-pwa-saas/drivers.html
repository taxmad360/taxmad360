<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TaxMad Driver – Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root { --blue: #00B5FF; --dark: #001a3d; --card: #0a2551; }
        body { background: var(--dark); font-family: 'Montserrat', sans-serif; color: white; margin: 0; height: 100vh; display: flex; justify-content: center; overflow: hidden; }
        .mobile-container { width: 100%; max-width: 414px; background: var(--dark); position: relative; display: flex; flex-direction: column; height: 100vh; }
        
        .screen { display: none; flex-direction: column; height: 100%; overflow-y: auto; padding-bottom: 100px; }
        .screen.active { display: flex; }

        /* Botón On/Off */
        .status-toggle { transition: all 0.3s ease; font-weight: 800; font-size: 10px; padding: 6px 16px; border-radius: 99px; cursor: pointer; border: none; }
        .status-off { background: #475569; color: #cbd5e1; }
        .status-on { background: #22c55e; color: #052e16; box-shadow: 0 0 15px rgba(34, 197, 94, 0.4); }

        #map { width: 100%; height: 280px; background: #eee; }
        
        .job-card { background: var(--card); padding: 18px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 12px; }
        .nav-btn { color: #64748b; cursor: pointer; text-align: center; flex: 1; transition: 0.2s; }
        .nav-btn.active { color: var(--blue); }

        /* Modal QR */
        #modal-qr { position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #qrcode { background: white; padding: 15px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="mobile-container">
    
    <div id="auth-screen" class="screen active justify-center p-10 text-center">
        <h1 class="text-4xl font-black mb-1">Tax<span style="color:var(--blue)">Mad</span></h1>
        <p class="text-[10px] font-bold tracking-[3px] text-sky-400 mb-10 uppercase">Driver Panel</p>
        <input type="text" id="user-input" placeholder="Usuario" class="w-full p-4 mb-3 rounded-xl bg-black/30 border border-white/10 outline-none">
        <input type="password" id="pass-input" placeholder="Contraseña" class="w-full p-4 mb-6 rounded-xl bg-black/30 border border-white/10 outline-none">
        <button onclick="intentarLogin()" class="w-full bg-sky-500 p-4 rounded-xl font-black italic">ENTRAR</button>
    </div>

    <div id="main-app" class="h-full flex-col hidden">
        
        <header class="p-4 flex justify-between items-center bg-[#001a3d] border-b border-white/5">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-sky-500 rounded-full flex items-center justify-center font-bold text-black" id="avatar-init">?</div>
                <div>
                    <p class="text-[8px] text-gray-500 font-black uppercase">Taxista Premium</p>
                    <p class="text-xs font-bold" id="header-name">...</p>
                </div>
            </div>
            <button id="btn-status" onclick="toggleStatus()" class="status-toggle status-off">DESCONECTADO</button>
        </header>

        <div id="scr-panel" class="screen">
            <div id="map"></div>
            <div class="p-4">
                <h3 class="text-[10px] font-black text-sky-400 uppercase tracking-widest mb-4">Servicios en curso/entrantes</h3>
                <div id="active-trips"></div>
            </div>
        </div>

        <div id="scr-viajes" class="screen p-4">
            <h2 class="text-xl font-black italic mb-6">Mis <span class="text-sky-500">Servicios</span></h2>
            <div id="history-list"></div>
        </div>

        <div id="scr-perfil" class="screen p-6">
            <h2 class="text-xl font-black italic mb-6">Mi <span class="text-sky-500">Perfil</span></h2>
            <div class="bg-white/5 p-6 rounded-3xl space-y-4 border border-white/5">
                <div class="border-b border-white/5 pb-2">
                    <p class="text-[9px] text-gray-500 font-bold uppercase">Nombre Completo</p>
                    <p class="font-bold" id="prof-full-name">...</p>
                </div>
                <div class="border-b border-white/5 pb-2">
                    <p class="text-[9px] text-gray-500 font-bold uppercase">Vehículo / Matrícula</p>
                    <p class="font-bold" id="prof-car">...</p>
                </div>
                <div class="border-b border-white/5 pb-2">
                    <p class="text-[9px] text-gray-500 font-bold uppercase">Licencia Taxi</p>
                    <p class="font-bold text-sky-400" id="prof-lic">...</p>
                </div>
                <div class="pb-2">
                    <p class="text-[9px] text-gray-500 font-bold uppercase">Titular de Licencia</p>
                    <p class="font-bold" id="prof-owner">...</p>
                </div>
            </div>
            <button onclick="location.reload()" class="w-full mt-10 text-red-400 font-bold text-[10px] uppercase tracking-widest"><i class="fa-solid fa-power-off mr-2"></i> Cerrar Sesión</button>
        </div>

        <nav class="fixed bottom-0 w-full max-width-[414px] h-20 bg-[#0a2551] flex justify-around items-center border-t border-white/5">
            <div onclick="showTab('panel')" id="n-panel" class="nav-btn active">
                <i class="fa-solid fa-house-chimney text-xl"></i>
                <p class="text-[9px] mt-1 font-bold">PANEL</p>
            </div>
            <div onclick="showTab('viajes')" id="n-viajes" class="nav-btn">
                <i class="fa-solid fa-route text-xl"></i>
                <p class="text-[9px] mt-1 font-bold">VIAJES</p>
            </div>
            <div onclick="showTab('perfil')" id="n-perfil" class="nav-btn">
                <i class="fa-solid fa-address-card text-xl"></i>
                <p class="text-[9px] mt-1 font-bold">PERFIL</p>
            </div>
        </nav>
    </div>

    <div id="modal-qr" class="hidden">
        <div id="qrcode"></div>
        <p class="text-white font-bold mt-4 mb-6 uppercase text-xs" id="qr-info-txt">Factura</p>
        <button onclick="document.getElementById('modal-qr').classList.add('hidden')" class="bg-white text-black px-8 py-3 rounded-full font-black text-xs">CERRAR</button>
    </div>

</div>

<script>
    const S_URL = 'https://wdxtnvblolhqipscpxer.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndkeHRudmJsb2xocWlwc2NweGVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NzQxNzIsImV4cCI6MjA4ODA1MDE3Mn0.xO19SVN8gowDATLWDEpyakcZXbdGg2Iex8C-ZEWL2dM';
    const _supabase = supabase.createClient(S_URL, S_KEY);

    let currentDriver = null;
    let map, marker;
    let isConnected = false;

    async function intentarLogin() {
        const u = document.getElementById('user-input').value;
        const p = document.getElementById('pass-input').value;
        const { data: d } = await _supabase.from('drivers').select('*').eq('usuario', u).single();

        if (d && d.password === p) {
            currentDriver = d;
            document.getElementById('auth-screen').classList.remove('active');
            document.getElementById('main-app').style.display = 'flex';
            
            // Llenar Perfil
            document.getElementById('header-name').innerText = d.nombre;
            document.getElementById('avatar-init').innerText = d.nombre[0].toUpperCase();
            document.getElementById('prof-full-name').innerText = `${d.nombre} ${d.apellidos || ''}`;
            document.getElementById('prof-car').innerText = `${d.modelo_coche || 'N/A'} - ${d.matricula || '---'}`;
            document.getElementById('prof-lic').innerText = d.num_licencia || 'MAD-000';
            document.getElementById('prof-owner').innerText = d.nombre_dueno || d.nombre;

            showTab('panel');
            initMap();
            escucharCambios();
        } else {
            alert("Acceso denegado");
        }
    }

    function initMap() {
        // Colores por defecto de Google Maps
        map = new google.maps.Map(document.getElementById('map'), {
            center: {lat: 40.41, lng: -3.70},
            zoom: 15,
            disableDefaultUI: true
        });
        marker = new google.maps.Marker({ map: map, icon: { url: 'https://cdn-icons-png.flaticon.com/512/3202/3202926.png', scaledSize: new google.maps.Size(40,40) } });
    }

    function toggleStatus() {
        isConnected = !isConnected;
        const btn = document.getElementById('btn-status');
        if(isConnected) {
            btn.innerText = "CONECTADO";
            btn.className = "status-toggle status-on";
            iniciarGPS();
        } else {
            btn.innerText = "DESCONECTADO";
            btn.className = "status-toggle status-off";
            detenerGPS();
        }
    }

    function iniciarGPS() {
        actualizarPos();
        window.gpsInterval = setInterval(actualizarPos, 300000); // 5 min
    }

    function detenerGPS() {
        clearInterval(window.gpsInterval);
    }

    function actualizarPos() {
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const p = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            map.setCenter(p);
            marker.setPosition(p);
            await _supabase.from('drivers').update({ latitud: p.lat.toString(), longitud: p.lng.toString() }).eq('id', currentDriver.id);
        });
    }

    function showTab(tab) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`scr-${tab}`).classList.add('active');
        document.getElementById(`n-${tab}`).classList.add('active');
        if(tab === 'viajes') cargarHistorial();
        if(tab === 'panel') cargarActivos();
    }

    async function cargarActivos() {
        const { data } = await _supabase.from('viajes').select('*').in('estado', ['pendiente','aceptado','en_punto','en_curso']).order('created_at',{ascending:false});
        const cont = document.getElementById('active-trips');
        cont.innerHTML = data.length ? data.map(t => `
            <div class="job-card">
                <p class="text-sky-400 font-black text-[9px] mb-2">${t.estado.toUpperCase()}</p>
                <p class="text-xs font-bold mb-1 italic">${t.origen}</p>
                <p class="text-[10px] text-gray-400 mb-4">${t.destino}</p>
                ${renderBotones(t)}
            </div>
        `).join('') : '<p class="text-center opacity-20 py-10">Buscando servicios...</p>';
    }

    function renderBotones(t) {
        if(t.estado === 'pendiente') return `<button onclick="updateTrip('${t.id}','aceptado')" class="w-full bg-sky-500 p-3 rounded-lg font-bold text-xs">ACEPTAR</button>`;
        if(t.estado === 'aceptado') return `<button onclick="updateTrip('${t.id}','en_punto')" class="w-full bg-emerald-500 p-3 rounded-lg font-bold text-xs">LLEGUÉ</button>`;
        if(t.estado === 'en_punto') return `<button onclick="updateTrip('${t.id}','en_curso')" class="w-full bg-amber-500 p-3 rounded-lg font-bold text-xs">INICIAR</button>`;
        if(t.estado === 'en_curso') return `<button onclick="finalizarViaje('${t.id}')" class="w-full bg-rose-500 p-3 rounded-lg font-bold text-xs">FINALIZAR</button>`;
    }

    async function cargarHistorial() {
        const { data } = await _supabase.from('viajes').select('*').eq('estado','finalizado').eq('driver_id', currentDriver.id).order('created_at',{ascending:false});
        document.getElementById('history-list').innerHTML = data.map(t => `
            <div class="bg-white/5 p-4 rounded-2xl mb-3 flex justify-between items-center border border-white/5">
                <div class="max-w-[70%]">
                    <p class="text-[9px] text-gray-500 font-bold">${new Date(t.created_at).toLocaleDateString()}</p>
                    <p class="text-xs font-bold truncate">${t.destino}</p>
                    <p class="text-sky-400 font-black text-sm">${t.precio}€</p>
                </div>
                <button onclick="verQR('${t.id}')" class="bg-sky-500/20 text-sky-400 p-3 rounded-xl"><i class="fa-solid fa-qrcode text-xl"></i></button>
            </div>
        `).join('');
    }

    async function verQR(id) {
        const { data: t } = await _supabase.from('viajes').select('*').eq('id', id).single();
        const info = { cliente: t.cliente_nombre, origen: t.origen, destino: t.destino, importe: t.precio, cif: currentDriver.cif, lic: currentDriver.num_licencia };
        const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(info))));
        
        document.getElementById('modal-qr').classList.remove('hidden');
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), { text: `https://tuweb.com/factura.html?v=${encoded}`, width: 200, height: 200 });
    }

    async function updateTrip(id, status) {
        await _supabase.from('viajes').update({ estado: status, driver_id: currentDriver.id }).eq('id', id);
        cargarActivos();
    }

    async function finalizarViaje(id) {
        await _supabase.from('viajes').update({ estado: 'finalizado' }).eq('id', id);
        verQR(id);
        cargarActivos();
    }

    function escucharCambios() {
        _supabase.channel('any').on('postgres_changes', { event: '*', table: 'viajes' }, () => {
            cargarActivos();
            if(document.getElementById('scr-viajes').classList.contains('active')) cargarHistorial();
        }).subscribe();
    }
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDxdjJ1HyJoVgeP6NFoS2i4va-tdRjrJIA" async defer></script>
</body>
</html>
