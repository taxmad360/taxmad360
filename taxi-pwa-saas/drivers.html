<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TaxMad Driver – Terminal Oficial</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffb000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3448/3448339.png">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root { --gold: #ffb000; --dark: #000000; --card: #111111; --text-gray: #a0a0a0; }
        body { background: var(--dark); font-family: 'Montserrat', sans-serif; color: white; margin: 0; height: 100vh; overflow: hidden; }
        .mobile-container { width: 100%; max-width: 414px; margin: 0 auto; background: var(--dark); position: relative; display: flex; flex-direction: column; height: 100vh; }
        .screen { display: none; flex-direction: column; height: 100%; overflow-y: auto; padding-bottom: 100px; }
        .screen.active { display: flex; }
        .status-toggle { transition: all 0.3s ease; font-weight: 800; font-size: 10px; padding: 10px 18px; border-radius: 8px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        .status-off { background: #222; color: #555; border: 1px solid #333; }
        .status-on { background: var(--gold); color: black; box-shadow: 0 0 20px rgba(255, 176, 0, 0.3); }
        #map { width: 100%; height: 280px; min-height: 280px; background: #111; filter: invert(90%) hue-rotate(180deg) brightness(0.7); }
        .lm-input { width: 100%; padding: 18px; margin-bottom: 14px; border-radius: 12px; border: 1px solid #222; background: #111; color: white; outline: none; font-weight: 500; transition: 0.3s; }
        .lm-input:focus { border-color: var(--gold); }
        .nav-btn { color: #444; cursor: pointer; text-align: center; flex: 1; transition: 0.2s; padding: 12px 0; }
        .nav-btn.active { color: var(--gold); }
        .premium-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 20px; padding: 20px; }
        #modal-qr { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #qrcode { background: white; padding: 15px; border-radius: 12px; margin: 20px 0; border: 4px solid var(--gold); }
    </style>
</head>
<body>

<div class="mobile-container">
    
    <div id="auth-screen" class="screen active justify-center p-10 text-center">
        <h1 class="text-4xl font-black mb-1 italic tracking-tighter">TAX<span style="color:var(--gold)">MAD</span></h1>
        <p class="text-[9px] font-bold tracking-[5px] text-zinc-500 mb-12 uppercase">Driver Terminal</p>
        
        <div class="text-left">
            <label class="text-[10px] font-extrabold text-zinc-600 ml-2 uppercase tracking-widest">Identificación</label>
            <input type="text" id="user-input" class="lm-input" placeholder="Usuario de conductor">
            <label class="text-[10px] font-extrabold text-zinc-600 ml-2 uppercase tracking-widest">Acceso</label>
            <input type="password" id="pass-input" class="lm-input" placeholder="••••••••">
        </div>
        
        <button onclick="intentarLogin()" class="w-full bg-white text-black py-5 rounded-xl font-black text-sm mt-6 hover:bg-[#ffb000] transition-colors active:scale-95">
            CONECTAR AL SISTEMA
        </button>
    </div>

    <div id="main-app" class="hidden flex-col h-full w-full">
        <header class="p-5 flex justify-between items-center bg-black border-b border-zinc-900">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-zinc-900 border border-zinc-800 rounded-full flex items-center justify-center font-bold text-gold text-lg" id="avatar-init" style="color:var(--gold)">?</div>
                <div>
                    <p class="text-[8px] text-zinc-500 font-black uppercase tracking-widest">Servicio Oficial</p>
                    <p class="text-sm font-extrabold" id="header-name">Cargando...</p>
                </div>
            </div>
            <button id="btn-status" onclick="toggleStatus()" class="status-toggle status-off">OFFLINE</button>
        </header>

        <div id="scr-panel" class="screen">
            <div id="map"></div>
            <div class="p-6">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-[10px] font-black text-zinc-500 uppercase tracking-widest">Servicios en Tiempo Real</h3>
                    <span id="vivo-indicator" class="hidden items-center text-[10px] text-[#ffb000] font-black animate-pulse">
                        <i class="fa-solid fa-circle text-[6px] mr-2"></i> EN LÍNEA
                    </span>
                </div>
                <div id="active-trips" class="space-y-4"></div>
            </div>
        </div>

        <div id="scr-viajes" class="screen p-6">
            <h2 class="text-2xl font-black italic mb-8">Mis <span style="color:var(--gold)">Servicios</span></h2>
            <div id="history-list" class="space-y-4"></div>
        </div>

        <div id="scr-perfil" class="screen p-6">
            <h2 class="text-2xl font-black italic mb-8">Mi <span style="color:var(--gold)">Perfil</span></h2>
            
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="premium-card bg-[#ffb000] !border-none text-black">
                    <p class="text-[9px] font-black uppercase opacity-60">Recaudación</p>
                    <p class="text-2xl font-black" id="stats-total">0€</p>
                </div>
                <div class="premium-card">
                    <p class="text-[9px] font-black uppercase text-zinc-500">Tasa (10%)</p>
                    <p class="text-2xl font-black text-rose-500" id="stats-comision">0€</p>
                </div>
            </div>

            <div id="profile-details-container" class="premium-card space-y-6"></div>

            <button onclick="location.reload()" class="w-full mt-10 bg-zinc-900 text-zinc-500 p-5 rounded-xl font-bold text-[10px] uppercase tracking-[3px] border border-zinc-800">
                <i class="fa-solid fa-power-off mr-2"></i> Finalizar Turno
            </button>
        </div>

        <nav class="absolute bottom-0 w-full h-20 bg-black flex justify-around items-center border-t border-zinc-900 px-6">
            <div onclick="showTab('panel')" id="n-panel" class="nav-btn active">
                <i class="fa-solid fa-radar text-xl"></i>
                <p class="text-[9px] mt-1 font-bold">RADAR</p>
            </div>
            <div onclick="showTab('viajes')" id="n-viajes" class="nav-btn">
                <i class="fa-solid fa-history text-xl"></i>
                <p class="text-[9px] mt-1 font-bold">VIAJES</p>
            </div>
            <div onclick="showTab('perfil')" id="n-perfil" class="nav-btn">
                <i class="fa-solid fa-user-circle text-xl"></i>
                <p class="text-[9px] mt-1 font-bold">PERFIL</p>
            </div>
        </nav>
    </div>

    <div id="modal-qr">
        <div class="bg-[#0a0a0a] p-8 rounded-3xl border border-zinc-800 w-full max-w-[320px] text-center shadow-2xl">
            <h3 class="text-[#ffb000] font-black text-xs uppercase italic tracking-widest mb-2">Comprobante Digital</h3>
            <div id="qrcode" class="flex justify-center"></div>
            <p class="text-[10px] text-zinc-500 mb-8 font-bold" id="qr-info-txt">VÁLIDO COMO FACTURA SIMPLIFICADA</p>
            <button onclick="document.getElementById('modal-qr').style.display = 'none'" class="w-full bg-white text-black py-4 rounded-xl font-black text-xs uppercase">CERRAR</button>
        </div>
    </div>
</div>

<script>
    const S_URL = 'https://wdxtnvblolhqipscpxer.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndkeHRudmJsb2xocWlwc2NweGVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NzQxNzIsImV4cCI6MjA4ODA1MDE3Mn0.xO19SVN8gowDATLWDEpyakcZXbdGg2Iex8C-ZEWL2dM';
    const _supabase = supabase.createClient(S_URL, S_KEY);

    let currentDriver = null;
    let map, marker, viajesChannel;
    let isConnected = false;

    // --- REGISTRO DE SERVICE WORKER ---
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js').then(reg => {
                console.log('Driver SW registrado');
            }).catch(err => console.log('Error SW', err));
        });
    }

    async function intentarLogin() {
        const u = document.getElementById('user-input').value;
        const p = document.getElementById('pass-input').value;
        if(!u || !p) return;

        const { data: d, error } = await _supabase.from('drivers').select('*').eq('usuario', u).single();
        
        if (d && d.password === p) {
            if(d.acceso_bloqueado) return alert("ACCESO DENEGADO POR ADMINISTRACIÓN");
            currentDriver = d;
            document.getElementById('auth-screen').classList.remove('active');
            document.getElementById('main-app').classList.replace('hidden', 'flex');
            document.getElementById('header-name').innerText = d.nombre;
            document.getElementById('avatar-init').innerText = d.nombre[0].toUpperCase();
            
            document.getElementById('profile-details-container').innerHTML = `
                <div class="flex justify-between items-center"><p class="text-[10px] text-zinc-500 font-bold uppercase">Vehículo</p><p class="font-bold text-sm">${d.marca_v || 'Premium Car'}</p></div>
                <div class="flex justify-between items-center"><p class="text-[10px] text-zinc-500 font-bold uppercase">Matrícula</p><p class="font-bold text-sm text-[#ffb000]">${d.matricula || '---'}</p></div>
                <div class="flex justify-between items-center"><p class="text-[10px] text-zinc-500 font-bold uppercase">Licencia</p><p class="font-bold text-sm text-zinc-300">${d.licencia || 'LIC-OFICIAL'}</p></div>
            `;
            initMap();
            showTab('panel');
        } else { 
            alert("Credenciales incorrectas o usuario no encontrado"); 
        }
    }

    function initMap() {
        map = new google.maps.Map(document.getElementById('map'), {
            center: {lat: 40.4168, lng: -3.7038}, zoom: 15, disableDefaultUI: true
        });
        marker = new google.maps.Marker({ 
            map: map, 
            icon: { url: 'https://cdn-icons-png.flaticon.com/512/3202/3202926.png', scaledSize: new google.maps.Size(40,40) } 
        });
    }

    function toggleStatus() {
        isConnected = !isConnected;
        const btn = document.getElementById('btn-status');
        const indicator = document.getElementById('vivo-indicator');
        
        if(isConnected) {
            btn.innerText = "CONECTADO";
            btn.className = "status-toggle status-on";
            indicator.style.display = 'flex';
            iniciarServicios();
        } else {
            btn.innerText = "OFFLINE";
            btn.className = "status-toggle status-off";
            indicator.style.display = 'none';
            detenerServicios();
        }
    }

    function iniciarServicios() {
        actualizarPos();
        window.gpsInterval = setInterval(actualizarPos, 10000); 
        
        viajesChannel = _supabase.channel('viajes_live').on('postgres_changes', { event: '*', table: 'viajes' }, () => {
            cargarActivos();
        }).subscribe();
        
        cargarActivos();
        _supabase.from('drivers').update({ estado: 'activo' }).eq('id', currentDriver.id);
    }

    function detenerServicios() {
        clearInterval(window.gpsInterval);
        if(viajesChannel) _supabase.removeChannel(viajesChannel);
        document.getElementById('active-trips').innerHTML = '<div class="text-center py-10 opacity-20 text-[10px] font-bold uppercase tracking-[4px] mt-10">Desconectado del servidor</div>';
        _supabase.from('drivers').update({ estado: 'inactivo' }).eq('id', currentDriver.id);
    }

    function actualizarPos() {
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const p = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            map.setCenter(p); 
            marker.setPosition(p);
            await _supabase.from('drivers').update({ 
                latitud: p.lat.toString(), 
                longitud: p.lng.toString(),
                ultima_conexion: new Date().toISOString()
            }).eq('id', currentDriver.id);
        });
    }

    async function cargarActivos() {
        if(!isConnected) return;
        const { data } = await _supabase.from('viajes').select('*').in('estado', ['pendiente','aceptado','en_punto','en_curso']).order('created_at',{ascending:false});
        const cont = document.getElementById('active-trips');
        
        cont.innerHTML = data && data.length ? data.map(t => `
            <div class="premium-card">
                <div class="flex justify-between items-start mb-4">
                    <span class="bg-zinc-800 text-[#ffb000] text-[9px] font-black px-3 py-1 rounded uppercase">${t.estado.replace('_',' ')}</span>
                    <span class="text-xl font-black">${t.precio}€</span>
                </div>
                <p class="text-[11px] font-bold mb-1 opacity-50 uppercase tracking-tighter">${t.origen}</p>
                <p class="text-sm font-black italic mb-6"> <span class="text-[#ffb000]">→</span> ${t.destino}</p>
                <div>${renderBotones(t)}</div>
            </div>
        `).join('') : '<div class="text-center py-10 opacity-20 text-[10px] font-bold uppercase tracking-[4px] mt-10">Buscando servicios...</div>';
    }

    function renderBotones(t) {
        const style = "w-full p-4 rounded-xl font-black text-[11px] tracking-widest transition-all active:scale-95 ";
        if(t.estado === 'pendiente') return `<button onclick="updateTrip('${t.id}','aceptado')" class="${style} bg-[#ffb000] text-black">ACEPTAR VIAJE</button>`;
        if(t.estado === 'aceptado') return `<button onclick="updateTrip('${t.id}','en_punto')" class="${style} bg-zinc-100 text-black">EN EL PUNTO</button>`;
        if(t.estado === 'en_punto') return `<button onclick="updateTrip('${t.id}','en_curso')" class="${style} bg-emerald-600 text-white">INICIAR RUTA</button>`;
        if(t.estado === 'en_curso') return `<button onclick="finalizarViaje('${t.id}')" class="${style} bg-rose-600 text-white">FINALIZAR SERVICIO</button>`;
    }

    async function updateTrip(id, status) { 
        await _supabase.from('viajes').update({ estado: status, driver_id: currentDriver.id }).eq('id', id); 
        cargarActivos(); 
    }

    async function finalizarViaje(id) { 
        const { data: trip } = await _supabase.from('viajes').select('precio').eq('id', id).single();
        await _supabase.from('viajes').update({ estado: 'finalizado' }).eq('id', id); 
        
        const comisionAdd = parseFloat(trip.precio) * 0.10;
        const { data: drv } = await _supabase.from('drivers').select('comision_pendiente_10, total_dinero_generado').eq('id', currentDriver.id).single();
        await _supabase.from('drivers').update({ 
            comision_pendiente_10: (drv.comision_pendiente_10 || 0) + comisionAdd,
            total_dinero_generado: (drv.total_dinero_generado || 0) + parseFloat(trip.precio)
        }).eq('id', currentDriver.id);
        
        verQR(id); 
        cargarActivos(); 
    }

    async function verQR(id) {
        const { data: t } = await _supabase.from('viajes').select('*').eq('id', id).single();
        const info = { id: t.id, eur: t.precio, fecha: new Date().toLocaleDateString() };
        document.getElementById('modal-qr').style.display = 'flex';
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), { 
            text: JSON.stringify(info), 
            width: 180, 
            height: 180,
            colorDark : "#000000",
            colorLight : "#ffffff"
        });
    }

    async function cargarHistorial() {
        const { data } = await _supabase.from('viajes').select('*').eq('estado','finalizado').eq('driver_id', currentDriver.id).order('created_at',{ascending:false});
        if(!data) return;
        document.getElementById('history-list').innerHTML = data.map(t => `
            <div class="premium-card flex justify-between items-center py-4">
                <div>
                    <p class="text-[8px] text-zinc-600 font-bold uppercase tracking-widest">${new Date(t.created_at).toLocaleDateString()}</p>
                    <p class="text-sm font-black">${t.precio}€ <span class="text-zinc-700 mx-1">/</span> <span class="font-medium text-xs text-zinc-400">${t.destino.substring(0,20)}...</span></p>
                </div>
                <button onclick="verQR('${t.id}')" class="text-[#ffb000] p-2"><i class="fa-solid fa-qrcode text-lg"></i></button>
            </div>
        `).join('');
    }

    function showTab(tab) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`scr-${tab}`).classList.add('active');
        document.getElementById(`n-${tab}`).classList.add('active');
        if(tab === 'viajes') cargarHistorial();
        if(tab === 'perfil') {
            _supabase.from('drivers').select('total_dinero_generado, comision_pendiente_10').eq('id', currentDriver.id).single().then(({data}) => {
                if(data) {
                    document.getElementById('stats-total').innerText = (data.total_dinero_generado || 0).toFixed(2) + "€";
                    document.getElementById('stats-comision').innerText = (data.comision_pendiente_10 || 0).toFixed(2) + "€";
                }
            });
        }
    }
</script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDxdjJ1HyJoVgeP6NFoS2i4va-tdRjrJIA" async defer></script>
</body>
</html>
