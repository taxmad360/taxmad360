<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TaxMad Driver – Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root { --blue: #00B5FF; --dark: #001a3d; --card: #0a2551; }
        body { background: var(--dark); font-family: 'Montserrat', sans-serif; color: white; margin: 0; height: 100vh; display: flex; justify-content: center; overflow: hidden; }
        .mobile-container { width: 100%; max-width: 414px; background: var(--dark); position: relative; display: flex; flex-direction: column; height: 100vh; }
        .lm-input { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; outline: none; }
        .lm-btn-primary { background: linear-gradient(90deg, #38bdf8 0%, #4f46e5 100%); padding: 16px; border-radius: 12px; width: 100%; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s; border: none; color: white; cursor: pointer; }
        .job-card { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .address-box { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 10px; margin-bottom: 8px; font-size: 11px; display: flex; align-items: center; gap: 10px; }
        .hidden { display: none !important; }
        
        /* Modal de Factura QR */
        #modal-qr { position: absolute; inset: 0; background: rgba(0,26,61,0.95); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; }
        #qrcode { background: white; padding: 15px; border-radius: 15px; margin: 20px 0; }
    </style>
</head>
<body>

<div class="mobile-container">
    
    <div id="auth-screen" class="flex flex-col justify-center p-10 h-full text-center">
        <h1 class="text-4xl font-black mb-1">Tax<span style="color:var(--blue)">Mad</span></h1>
        <p class="text-[10px] font-bold tracking-[3px] text-sky-400 mb-10 uppercase">Driver Premium Panel</p>
        <input type="text" id="user-input" placeholder="Usuario" class="lm-input">
        <input type="password" id="pass-input" placeholder="Contraseña" class="lm-input">
        <button onclick="intentarLogin()" id="btn-login" class="lm-btn-primary mt-4">ENTRAR AL SISTEMA</button>
    </div>

    <div id="main-app" class="hidden flex flex-col h-full relative">
        <header class="p-5 flex justify-between items-center bg-[#001a3d]/80 backdrop-blur-lg border-b border-white/5">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-sky-500 rounded-full flex items-center justify-center font-bold text-black" id="avatar-initial">?</div>
                <div>
                    <p class="text-[9px] text-gray-400 uppercase font-black">Driver Activo</p>
                    <p class="text-sm font-bold" id="display-name">...</p>
                </div>
            </div>
            <div id="status-tag" class="bg-green-500 text-black text-[9px] font-black px-3 py-1 rounded-full">DISPONIBLE</div>
        </header>

        <main class="flex-grow p-4 overflow-y-auto" id="content-main">
            <div id="trip-list"></div>
        </main>

        <div id="modal-qr" class="hidden">
            <i class="fa-solid fa-circle-check text-green-400 text-5xl mb-4"></i>
            <h2 class="text-xl font-bold uppercase">Viaje Finalizado</h2>
            <p class="text-xs text-gray-400 mt-2">Muestre este código al cliente para que descargue su factura</p>
            
            <div id="qrcode"></div>
            
            <p id="factura-num" class="text-[10px] font-bold text-sky-400 mb-6"></p>
            <button onclick="cerrarFactura()" class="lm-btn-primary py-3">VOLVER AL PANEL</button>
        </div>

        <nav class="h-20 bg-[#0a2551]/90 backdrop-blur-md flex justify-around items-center border-t border-white/5">
            <div class="text-sky-400 text-center"><i class="fa-solid fa-map-location-dot text-xl"></i><p class="text-[9px] mt-1 font-bold">MAPA</p></div>
            <div class="text-gray-500 text-center" onclick="cargarViajes()"><i class="fa-solid fa-list-check text-xl"></i><p class="text-[9px] mt-1 font-bold">VIAJES</p></div>
            <div class="text-gray-500 text-center"><i class="fa-solid fa-user-tie text-xl"></i><p class="text-[9px] mt-1 font-bold">PERFIL</p></div>
        </nav>
    </div>
</div>

<audio id="alert-snd" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<script>
    const S_URL = 'https://wdxtnvblolhqipscpxer.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndkeHRudmJsb2xocWlwc2NweGVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NzQxNzIsImV4cCI6MjA4ODA1MDE3Mn0.xO19SVN8gowDATLWDEpyakcZXbdGg2Iex8C-ZEWL2dM';
    const _supabase = supabase.createClient(S_URL, S_KEY);

    let currentDriver = null;
    let mainInterval = null;

    async function intentarLogin() {
        const u = document.getElementById('user-input').value;
        const p = document.getElementById('pass-input').value;
        
        const { data: d, error } = await _supabase.from('drivers').select('*').eq('usuario', u).single();

        if (!d || d.password !== p) {
            alert("Error de acceso");
            return;
        }

        currentDriver = d;
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        document.getElementById('display-name').innerText = d.nombre;
        document.getElementById('avatar-initial').innerText = d.nombre[0];

        iniciarSistemaDriver();
    }

    function iniciarSistemaDriver() {
        // 1. Actualización GPS cada 5 min para el mapa del cliente
        actualizarPosicionReferencia();
        setInterval(actualizarPosicionReferencia, 300000); 

        // 2. Realtime para nuevos viajes
        _supabase.channel('cambios').on('postgres_changes', { event: '*', table: 'viajes' }, () => cargarViajes()).subscribe();
        cargarViajes();
    }

    async function actualizarPosicionReferencia() {
        navigator.geolocation.getCurrentPosition(async (pos) => {
            await _supabase.from('drivers').update({
                latitud: pos.coords.latitude.toString(),
                longitud: pos.coords.longitude.toString(),
                ultima_conexion: new Date().toISOString(),
                estado: 'activo'
            }).eq('id', currentDriver.id);
        });
    }

    async function cargarViajes() {
        const { data } = await _supabase.from('viajes')
            .select('*')
            .in('estado', ['pendiente', 'aceptado', 'en_punto', 'en_curso'])
            .order('created_at', { ascending: false });

        const container = document.getElementById('trip-list');
        if (!data || data.length === 0) {
            container.innerHTML = '<div class="text-center py-20 opacity-20"><i class="fa-solid fa-road text-5xl mb-4"></i><p>Esperando servicios...</p></div>';
            return;
        }

        container.innerHTML = data.map(trip => `
            <div class="job-card">
                <div class="flex justify-between items-start mb-4">
                    <span class="bg-sky-400 text-black text-[9px] font-black px-2 py-1 rounded">${trip.estado.toUpperCase()}</span>
                    <span class="text-xl font-bold">${trip.precio > 0 ? trip.precio + '€' : 'TAXÍMETRO'}</span>
                </div>
                <div class="address-box"><i class="fa-solid fa-circle text-sky-400 text-[8px]"></i> ${trip.origen}</div>
                <div class="address-box"><i class="fa-solid fa-location-dot text-gray-400 text-[8px]"></i> ${trip.destino}</div>
                <div class="text-[10px] text-gray-400 mb-4 px-2">Cliente: ${trip.cliente_nombre}</div>
                ${renderBotones(trip)}
            </div>
        `).join('');
    }

    function renderBotones(trip) {
        if (trip.estado === 'pendiente') return `<button onclick="cambiarEstado('${trip.id}', 'aceptado')" class="lm-btn-primary py-3 text-xs">ACEPTAR VIAJE</button>`;
        if (trip.estado === 'aceptado') return `<button onclick="cambiarEstado('${trip.id}', 'en_punto')" class="lm-btn-primary py-3 text-xs" style="background:green">HE LLEGADO</button>`;
        if (trip.estado === 'en_punto') return `<button onclick="cambiarEstado('${trip.id}', 'en_curso')" class="lm-btn-primary py-3 text-xs" style="background:orange">INICIAR TRAYECTO</button>`;
        if (trip.estado === 'en_curso') return `<button onclick="finalizarViaje('${trip.id}')" class="lm-btn-primary py-3 text-xs" style="background:red">FINALIZAR Y FACTURAR</button>`;
        return "";
    }

    async function cambiarEstado(id, nuevo) {
        await _supabase.from('viajes').update({ estado: nuevo, driver_id: currentDriver.id }).eq('id', id);
        cargarViajes();
    }

    async function finalizarViaje(id) {
        // 1. Marcar como finalizado
        const { data: trip } = await _supabase.from('viajes').update({ estado: 'finalizado' }).eq('id', id).select().single();
        
        // 2. Generar Factura (Simulada mediante URL con parámetros para que el cliente la lea)
        // En un caso real, esto iría a una página factura.html
        const numFactura = "INV-" + Math.floor(Math.random() * 999999);
        const fechaHora = new Date().toLocaleString();
        
        const datosFactura = {
            n: trip.cliente_nombre,
            o: trip.origen,
            d: trip.destino,
            f: fechaHora,
            cif: currentDriver.cif || "B-12345678",
            owner: currentDriver.nombre_dueno || currentDriver.nombre,
            lic: currentDriver.num_licencia || "MAD-000",
            tel: currentDriver.telefono || "600000000",
            id: numFactura,
            p: trip.precio > 0 ? trip.precio : "Tarifa oficial"
        };

        // Convertimos a Base64 para pasar por URL de forma "limpia"
        const encodedData = btoa(unescape(encodeURIComponent(JSON.stringify(datosFactura))));
        const urlFactura = `https://tupagina.com/factura.html?data=${encodedData}`;

        // 3. Mostrar QR
        document.getElementById('modal-qr').classList.remove('hidden');
        document.getElementById('factura-num').innerText = "FACTURA: " + numFactura;
        
        document.getElementById('qrcode').innerHTML = ""; // Limpiar anterior
        new QRCode(document.getElementById("qrcode"), {
            text: urlFactura,
            width: 200,
            height: 200,
            colorDark : "#000000",
            colorLight : "#ffffff",
        });
    }

    function cerrarFactura() {
        document.getElementById('modal-qr').classList.add('hidden');
        cargarViajes();
    }
</script>
</body>
</html>
