<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TaxMad Driver – Terminal Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root { --blue: #00B5FF; --dark: #001a3d; }
        body { background: var(--dark); font-family: 'Montserrat', sans-serif; color: white; margin: 0; height: 100vh; overflow: hidden; }
        .mobile-container { width: 100%; max-width: 414px; margin: 0 auto; background: var(--dark); position: relative; display: flex; flex-direction: column; height: 100vh; }
        .screen { display: none; flex-direction: column; height: 100%; overflow-y: auto; padding-bottom: 90px; }
        .screen.active { display: flex; }
        
        /* Botón de Estado */
        .status-toggle { transition: all 0.3s; font-weight: 800; font-size: 10px; padding: 8px 16px; border-radius: 99px; cursor: pointer; border: none; text-transform: uppercase; }
        .status-off { background: #334155; color: #94a3b8; }
        .status-on { background: #22c55e; color: #052e16; box-shadow: 0 0 15px rgba(34, 197, 94, 0.3); }
        
        #map { width: 100%; height: 280px; min-height: 280px; background: #e5e7eb; }
        .nav-btn { color: #64748b; cursor: pointer; text-align: center; flex: 1; transition: 0.2s; padding: 10px 0; }
        .nav-btn.active { color: var(--blue); }
        
        /* Indicador Vivo */
        #status-indicator { display: none; }
        .vivo-active { display: flex !important; }
        
        .lm-input { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.4); color: white; outline: none; }
    </style>
</head>
<body>

<div class="mobile-container">
    
    <div id="auth-screen" class="screen active justify-center p-10 text-center">
        <h1 class="text-4xl font-black mb-1 italic">Tax<span style="color:var(--blue)">Mad</span></h1>
        <p class="text-[10px] font-bold tracking-[4px] text-sky-400 mb-12 uppercase">Driver Terminal</p>
        <div class="text-left">
            <input type="text" id="user-input" class="lm-input" placeholder="Usuario">
            <input type="password" id="pass-input" class="lm-input" placeholder="••••••••">
        </div>
        <button onclick="intentarLogin()" class="w-full bg-sky-500 p-5 rounded-2xl font-black text-black">CONECTAR</button>
    </div>

    <div id="main-app" class="hidden flex-col h-full w-full">
        <header class="p-4 flex justify-between items-center bg-[#001a3d] border-b border-white/10">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-sky-500 rounded-full flex items-center justify-center font-bold text-black" id="avatar-init">?</div>
                <div>
                    <p class="text-[8px] text-gray-500 font-black uppercase">Servicio Oficial</p>
                    <p class="text-xs font-bold" id="header-name">...</p>
                </div>
            </div>
            <button id="btn-status" onclick="toggleStatus()" class="status-toggle status-off">OFFLINE</button>
        </header>

        <div id="scr-panel" class="screen">
            <div id="map"></div>
            <div class="p-5">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-[10px] font-black text-sky-400 uppercase tracking-widest">Servicios Cercanos</h3>
                    <span id="status-indicator" class="text-[9px] text-green-500 animate-pulse font-bold items-center gap-1">
                        ● VIVO
                    </span>
                </div>
                <div id="active-trips" class="space-y-3"></div>
            </div>
        </div>

        <nav class="absolute bottom-0 w-full h-20 bg-[#0a2551] flex justify-around items-center border-t border-white/10">
            <div onclick="showTab('panel')" class="nav-btn active"><i class="fa-solid fa-house-chimney text-xl"></i><p class="text-[9px] mt-1">PANEL</p></div>
            <div onclick="showTab('perfil')" class="nav-btn"><i class="fa-solid fa-user text-xl"></i><p class="text-[9px] mt-1">PERFIL</p></div>
        </nav>
    </div>
</div>

<script>
    const S_URL = 'https://wdxtnvblolhqipscpxer.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndkeHRudmJsb2xocWlwc2NweGVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NzQxNzIsImV4cCI6MjA4ODA1MDE3Mn0.xO19SVN8gowDATLWDEpyakcZXbdGg2Iex8C-ZEWL2dM';
    const _supabase = supabase.createClient(S_URL, S_KEY);

    let currentDriver = null;
    let map, marker, gpsInterval, viajesChannel;
    let isConnected = false;

    async function intentarLogin() {
        const u = document.getElementById('user-input').value;
        const p = document.getElementById('pass-input').value;
        const { data: d } = await _supabase.from('drivers').select('*').eq('usuario', u).single();
        
        if (d && d.password === p) {
            currentDriver = d;
            document.getElementById('auth-screen').classList.remove('active');
            document.getElementById('main-app').classList.replace('hidden', 'flex');
            document.getElementById('header-name').innerText = d.nombre;
            initMap();
        } else { alert("Error"); }
    }

    function initMap() {
        map = new google.maps.Map(document.getElementById('map'), {
            center: {lat: 40.4168, lng: -3.7038}, zoom: 16, disableDefaultUI: true
        });
        marker = new google.maps.Marker({ 
            map: map, 
            icon: { url: 'https://cdn-icons-png.flaticon.com/512/3202/3202926.png', scaledSize: new google.maps.Size(40,40) } 
        });
    }

    function toggleStatus() {
        isConnected = !isConnected;
        const btn = document.getElementById('btn-status');
        const vivo = document.getElementById('status-indicator');
        
        if(isConnected) {
            btn.innerText = "CONECTADO";
            btn.className = "status-toggle status-on";
            vivo.classList.add('vivo-active');
            iniciarServicios();
        } else {
            btn.innerText = "OFFLINE";
            btn.className = "status-toggle status-off";
            vivo.classList.remove('vivo-active');
            detenerServicios();
        }
    }

    function iniciarServicios() {
        // 1. Iniciar GPS cada 5 min
        actualizarPos();
        gpsInterval = setInterval(actualizarPos, 300000);

        // 2. Activar modo "VIVO" (Realtime)
        viajesChannel = _supabase.channel('viajes_live')
            .on('postgres_changes', { event: '*', table: 'viajes' }, () => {
                cargarActivos();
            })
            .subscribe();
        
        cargarActivos();
    }

    function detenerServicios() {
        if(gpsInterval) clearInterval(gpsInterval);
        if(viajesChannel) _supabase.removeChannel(viajesChannel);
        document.getElementById('active-trips').innerHTML = '<p class="text-center opacity-30 text-xs py-10">MODO OFFLINE - CONÉCTATE PARA RECIBIR VIAJES</p>';
    }

    async function actualizarPos() {
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const p = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            map.panTo(p); marker.setPosition(p);
            await _supabase.from('drivers').update({ latitud: p.lat.toString(), longitud: p.lng.toString() }).eq('id', currentDriver.id);
        });
    }

    async function cargarActivos() {
        if(!isConnected) return;
        const { data } = await _supabase.from('viajes').select('*').in('estado', ['pendiente','aceptado','en_curso']);
        const cont = document.getElementById('active-trips');
        cont.innerHTML = data.length ? data.map(t => `
            <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                <div class="flex justify-between"><span class="text-sky-400 font-bold">${t.precio}€</span></div>
                <p class="text-xs mt-1">${t.origen} → ${t.destino}</p>
            </div>
        `).join('') : '<p class="text-center opacity-30 text-xs py-10">ESPERANDO NUEVOS VIAJES...</p>';
    }

    function showTab(tab) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(`scr-${tab}`).classList.add('active');
    }
</script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDxdjJ1HyJoVgeP6NFoS2i4va-tdRjrJIA" async defer></script>
</body>
</html>
