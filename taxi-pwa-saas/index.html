<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TaxMad – Premium App</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { --blue: #00B5FF; --dark: #112F5C; --bg-app: #ffffff; --input-bg: #f3f4f6; }
        body { background: #001a3d; font-family: "Montserrat", sans-serif; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        .mobile-container { width: 100%; max-width: 414px; background: var(--bg-app); position: relative; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 40px rgba(0,0,0,0.5); }
        
        /* Pantallas de Autenticación */
        #auth-screen { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; padding: 40px; background: #001a3d; color: white; z-index: 5000; text-align: center; overflow-y: auto; }
        .input-auth { width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: white; outline: none; font-size: 14px; }
        
        /* Selector de Foto Circular */
        .photo-picker { width: 100px; height: 100px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 2px dashed var(--blue); margin: 0 auto 20px; position: relative; cursor: pointer; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .photo-picker img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .photo-picker i { font-size: 24px; color: var(--blue); }

        /* App Principal */
        #main-app, #hucha-screen { display: none; flex-direction: column; height: 100%; background: white; overflow-y: auto; padding-bottom: 100px; }
        .user-header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; background: white; position: sticky; top: 0; z-index: 100; }
        .logo-txt { font-weight: 800; font-size: 20px; color: var(--dark); }
        .logo-txt span { color: var(--blue); }

        .form-content { padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .input-group { position: relative; }
        .input-group label { display: block; font-size: 9px; font-weight: 800; color: var(--dark); margin-bottom: 4px; margin-left: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-group input { width: 100%; padding: 12px 45px 12px 15px; border-radius: 12px; background: var(--input-bg); border: 1px solid #e5e7eb; font-size: 14px; font-weight: 500; color: #333; outline: none; }
        .input-group i { position: absolute; right: 15px; top: 32px; color: var(--blue); font-size: 16px; }

        #map { width: 100%; height: 200px; background: #f0f0f0; border-radius: 15px; margin: 10px 0; }
        
        .taxcoin-card { background: linear-gradient(135deg, #001a3d 0%, #112F5C 100%); margin: 10px 20px; padding: 15px; border-radius: 20px; color: white; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 8px 20px rgba(0,181,255,0.2); }
        .tc-val { font-size: 22px; font-weight: 900; color: var(--blue); }

        .info-card { background: #f9fafb; margin: 10px 20px; padding: 15px; border-radius: 15px; border: 1px solid #eee; display: none; }
        .price-val { font-size: 28px; font-weight: 800; color: var(--dark); text-align: center; display: block; }
        .tarifa-badge { font-size: 10px; background: var(--blue); color: white; padding: 2px 8px; border-radius: 10px; font-weight: 700; margin-bottom: 5px; display: inline-block; }

        .btn-main { background: linear-gradient(90deg, #38bdf8 0%, #4f46e5 100%); color: white; padding: 16px; border-radius: 14px; width: 90%; margin: 10px auto; font-weight: 800; text-align: center; cursor: pointer; border: none; text-transform: uppercase; letter-spacing: 1px; }
        .btn-main:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .movimiento-item { background: white; margin: 8px 20px; padding: 15px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.02); border: 1px solid #f1f5f9; }
        .nav-btn { cursor: pointer; transition: 0.3s; color: #9ca3af; }
        .nav-btn.active { color: #00B5FF; }

        #active-trip-widget { display: none; position: absolute; bottom: 90px; left: 15px; right: 15px; background: #001a3d; border-radius: 20px; padding: 15px; z-index: 2000; color: white; border: 1px solid rgba(0,181,255,0.3); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="mobile-container">
    
    <div id="auth-screen">
        <div style="font-size: 35px; font-weight: 900; margin-bottom: 30px;">Tax<span style="color:var(--blue)">Mad</span></div>
        
        <div id="login-box">
            <input type="text" id="user-login" placeholder="Usuario" class="input-auth">
            <input type="password" id="pass-login" placeholder="Contraseña" class="input-auth">
            <button onclick="intentarAcceso()" class="btn-main" style="width: 100%;">ENTRAR</button>
            <p class="mt-4 text-xs text-gray-400">¿No tienes cuenta? <span class="text-sky-400 font-bold cursor-pointer" onclick="toggleAuth('register')">Regístrate</span></p>
        </div>

        <div id="register-box" class="hidden">
            <h2 id="form-title" class="mb-4 font-bold">Crear Cuenta</h2>
            
            <input type="file" id="reg-foto-input" accept="image/*" class="hidden" onchange="previewImagen(this)">
            <div class="photo-picker" onclick="document.getElementById('reg-foto-input').click()">
                <i class="fa-solid fa-camera" id="icon-cam"></i>
                <img id="img-preview" src="">
            </div>

            <div class="grid grid-cols-2 gap-2">
                <input type="text" id="reg-nom" placeholder="Nombre" class="input-auth">
                <input type="text" id="reg-ape" placeholder="Apellido" class="input-auth">
            </div>
            <input type="text" id="reg-user" placeholder="Usuario" class="input-auth">
            <input type="password" id="reg-pass" placeholder="Contraseña" class="input-auth">
            <input type="password" id="reg-pass2" placeholder="Confirmar" class="input-auth">
            <input type="tel" id="reg-tel" placeholder="Teléfono" class="input-auth">
            <button id="btn-registro" onclick="registrarUsuario()" class="btn-main" style="width: 100%;">GUARDAR</button>
            <p class="mt-4 text-xs text-gray-400" onclick="toggleAuth('login')">Volver al Login</p>
        </div>
    </div>

    <div id="main-app">
        <header class="user-header">
            <div class="flex items-center gap-3">
                <img id="u-img" src="" class="w-10 h-10 rounded-full border-2 border-sky-400 object-cover" onclick="abrirEditor()">
                <div>
                    <p style="font-size: 8px; color: #aaa; font-weight:800; letter-spacing: 1px;">TAXMAD CLIENT</p>
                    <h2 id="u-name" style="font-size: 13px; font-weight: 700;">---</h2>
                </div>
            </div>
            <div class="logo-txt text-right">Tax<span>Mad</span></div>
        </header>

        <div class="taxcoin-card">
            <div>
                <p class="text-[9px] font-black opacity-60 uppercase">Saldo Taxcoins</p>
                <p class="tc-val"><span id="u-tc">0.00</span> <small class="text-xs">TC</small></p>
            </div>
            <button onclick="showTab('hucha')" class="bg-white/10 p-2 px-4 rounded-xl text-[10px] font-bold border border-white/20">
                <i class="fa-solid fa-wallet mr-1"></i> MI HUCHA
            </button>
        </div>

        <div class="form-content">
            <div class="input-group"><label>Recogida</label><input type="text" id="origin" placeholder="¿Dónde recogemos?"><i class="fa-solid fa-location-dot"></i></div>
            <div class="input-group"><label>Destino</label><input type="text" id="destination" placeholder="¿A dónde vas?"><i class="fa-solid fa-flag-checkered"></i></div>
            <div class="input-group"><label>Reserva</label><input type="datetime-local" id="fechaHora"><i class="fa-solid fa-clock"></i></div>
            
            <div id="map"></div>

            <div id="info-resumen" class="info-card">
                <div class="tarifa-badge">RESERVA PREMIUM</div>
                <span id="precio-txt" class="price-val">0.00€</span>
                <p class="text-[9px] text-center text-sky-500 font-bold mt-1 italic">+ 0.50 TC de regalo al finalizar</p>
            </div>

            <button id="btnAction" class="btn-main" onclick="procesarViaje()">CALCULAR PRECIO</button>
        </div>
    </div>

    <div id="hucha-screen">
        <div class="p-6">
            <h1 class="text-2xl font-black italic">Mi Hucha <span class="text-sky-500">TC</span></h1>
            <div class="mt-6 bg-gradient-to-br from-gray-900 to-blue-900 p-6 rounded-3xl text-white shadow-2xl relative overflow-hidden">
                <div class="absolute -right-4 -top-4 opacity-10 text-8xl rotate-12"><i class="fa-solid fa-coins"></i></div>
                <p class="text-[10px] font-bold opacity-60 uppercase tracking-widest">Saldo Disponible</p>
                <h2 class="text-4xl font-black mt-1" id="hucha-main-val">0.00 <small class="text-lg">TC</small></h2>
                <button onclick="transferirTC()" class="w-full mt-6 py-3 bg-sky-500 rounded-xl font-bold text-sm shadow-lg border-b-4 border-sky-700 active:border-0">ENVIAR TC A UN AMIGO</button>
            </div>
            <h3 class="mt-8 mb-4 px-2 text-xs font-black text-gray-400 uppercase italic tracking-widest">Actividad Reciente</h3>
            <div id="lista-tc" class="space-y-1"></div>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full max-w-[414px] h-20 bg-white border-t flex justify-around items-center z-[4000]">
        <div onclick="showTab('home')" id="n-home" class="nav-btn active text-center text-[10px] font-bold"><i class="fa-solid fa-car-side text-xl block mb-1"></i>Viajar</div>
        <div onclick="showTab('hucha')" id="n-hucha" class="nav-btn text-center text-[10px] font-bold"><i class="fa-solid fa-wallet text-xl block mb-1"></i>Hucha</div>
        <div onclick="abrirEditor()" id="n-perfil" class="nav-btn text-center text-[10px] font-bold"><i class="fa-solid fa-user-gear text-xl block mb-1"></i>Perfil</div>
    </nav>
</div>

<script>
    const S_URL = 'https://wdxtnvblolhqipscpxer.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndkeHRudmJsb2xocWlwc2NweGVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NzQxNzIsImV4cCI6MjA4ODA1MDE3Mn0.xO19SVN8gowDATLWDEpyakcZXbdGg2Iex8C-ZEWL2dM';
    const _supabase = supabase.createClient(S_URL, S_KEY);

    let map, directionsRenderer, directionsService, currentUser = null, ultimoCalculo = null;

    // --- MANEJO DE FOTO ---
    function previewImagen(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('img-preview').src = e.target.result;
                document.getElementById('img-preview').style.display = 'block';
                document.getElementById('icon-cam').style.display = 'none';
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function subirFoto(file, usuario) {
        const fileExt = file.name.split('.').pop();
        const fileName = `${usuario}-${Date.now()}.${fileExt}`;
        const { data, error } = await _supabase.storage.from('avatars').upload(fileName, file);
        if (error) return null;
        const { data: { publicUrl } } = _supabase.storage.from('avatars').getPublicUrl(fileName);
        return publicUrl;
    }

    // --- NAVEGACIÓN ---
    function showTab(tab) {
        document.getElementById('main-app').style.display = tab === 'home' ? 'flex' : 'none';
        document.getElementById('hucha-screen').style.display = tab === 'hucha' ? 'flex' : 'none';
        document.getElementById('n-home').classList.toggle('active', tab === 'home');
        document.getElementById('n-hucha').classList.toggle('active', tab === 'hucha');
        if(tab === 'hucha') renderHucha();
    }

    function toggleAuth(view) {
        document.getElementById('login-box').classList.add('hidden');
        document.getElementById('register-box').classList.add('hidden');
        document.getElementById(view + '-box').classList.remove('hidden');
    }

    // --- REGISTRO Y LOGIN ---
    async function registrarUsuario() {
        const btn = document.getElementById('btn-registro');
        const u = document.getElementById('reg-user').value;
        const p = document.getElementById('reg-pass').value;
        const fotoFile = document.getElementById('reg-foto-input').files[0];

        if(!u || !p) return alert("Faltan datos");
        if(p !== document.getElementById('reg-pass2').value) return alert("Passwords no coinciden");

        btn.innerText = "PROCESANDO...";
        btn.disabled = true;

        let urlFoto = currentUser?.foto || `https://ui-avatars.com/api/?name=${u}`;
        if (fotoFile) {
            const subida = await subirFoto(fotoFile, u);
            if (subida) urlFoto = subida;
        }

        const datos = {
            nombre: document.getElementById('reg-nom').value,
            apellido: document.getElementById('reg-ape').value,
            usuario: u, password: p,
            telefono: document.getElementById('reg-tel').value,
            foto: urlFoto, taxcoins: currentUser ? currentUser.taxcoins : 0
        };

        const { error } = await _supabase.from('clientes').upsert([datos], {onConflict: 'usuario'});
        if(!error) { alert("¡Guardado!"); location.reload(); } else { alert("Error"); btn.disabled = false; btn.innerText = "GUARDAR"; }
    }

    async function intentarAcceso() {
        const u = document.getElementById('user-login').value;
        const p = document.getElementById('pass-login').value;
        const { data } = await _supabase.from('clientes').select('*').eq('usuario', u).single();

        if (data && data.password === p) {
            currentUser = data;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-app').style.display = 'flex';
            document.getElementById('u-name').innerText = `${data.nombre} ${data.apellido}`;
            document.getElementById('u-tc').innerText = data.taxcoins.toFixed(2);
            document.getElementById('u-img').src = data.foto || `https://ui-avatars.com/api/?name=${data.nombre}`;
            initMap();
        } else { alert("Credenciales incorrectas"); }
    }

    // --- LÓGICA DE VIAJES ---
    function initMap() {
        directionsService = new google.maps.DirectionsService();
        directionsRenderer = new google.maps.DirectionsRenderer({ polylineOptions: { strokeColor: "#00B5FF", strokeWeight: 6 }});
        map = new google.maps.Map(document.getElementById('map'), { center: {lat: 40.41, lng: -3.70}, zoom: 14, disableDefaultUI: true });
        directionsRenderer.setMap(map);
        new google.maps.places.Autocomplete(document.getElementById('origin'));
        new google.maps.places.Autocomplete(document.getElementById('destination'));
    }

    async function procesarViaje() {
        const btn = document.getElementById('btnAction');
        const o = document.getElementById('origin').value;
        const d = document.getElementById('destination').value;

        if (!ultimoCalculo) {
            btn.innerText = "CALCULANDO...";
            directionsService.route({ origin: o, destination: d, travelMode: 'DRIVING' }, (res, status) => {
                if(status === 'OK') {
                    directionsRenderer.setDirections(res);
                    const total = (6 + (res.routes[0].legs[0].distance.value/1000 * 1.45)).toFixed(2);
                    ultimoCalculo = { o, d, p: total };
                    document.getElementById('precio-txt').innerText = total + "€";
                    document.getElementById('info-resumen').style.display = 'block';
                    btn.innerText = "CONFIRMAR RESERVA";
                }
            });
        } else {
            const { data } = await _supabase.from('viajes').insert([{
                cliente_id: currentUser.id, cliente_nombre: currentUser.nombre,
                origen: o, destino: d, precio: parseFloat(ultimoCalculo.p), estado: 'pendiente'
            }]).select();
            if(data) { alert("Buscando Conductor..."); btn.style.display='none'; }
        }
    }

    // --- HUCHA Y TRANSFERENCIAS ---
    async function renderHucha() {
        document.getElementById('hucha-main-val').innerText = currentUser.taxcoins.toFixed(2) + " TC";
        const { data } = await _supabase.from('historial_tc').select('*').eq('cliente_id', currentUser.id).order('fecha', {ascending: false});
        const list = document.getElementById('lista-tc');
        list.innerHTML = data && data.length ? '' : '<p class="text-center text-gray-400 text-xs py-10">Sin movimientos</p>';
        if(data) data.forEach(m => {
            const isPos = m.monto > 0;
            list.innerHTML += `<div class="movimiento-item">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full ${isPos?'bg-green-100 text-green-600':'bg-red-100 text-red-600'} flex items-center justify-center"><i class="fa-solid ${isPos?'fa-plus':'fa-minus'}"></i></div>
                    <div><p class="text-xs font-bold">${m.concepto}</p><p class="text-[8px] text-gray-400 uppercase">${new Date(m.fecha).toLocaleDateString()}</p></div>
                </div>
                <p class="font-black ${isPos?'text-green-500':'text-red-500'}">${isPos?'+':''}${m.monto.toFixed(2)}</p>
            </div>`;
        });
    }

    async function transferirTC() {
        const uDest = prompt("Usuario destino:");
        const cant = parseFloat(prompt("Cantidad de TC:"));
        if(cant > currentUser.taxcoins) return alert("Saldo insuficiente");

        const { data: receptor } = await _supabase.from('clientes').select('*').eq('usuario', uDest).single();
        if(receptor) {
            await _supabase.from('clientes').update({ taxcoins: receptor.taxcoins + cant }).eq('id', receptor.id);
            await _supabase.from('clientes').update({ taxcoins: currentUser.taxcoins - cant }).eq('id', currentUser.id);
            await _supabase.from('historial_tc').insert([
                { cliente_id: currentUser.id, monto: -cant, concepto: `Envío a @${uDest}` },
                { cliente_id: receptor.id, monto: cant, concepto: `De @${currentUser.usuario}` }
            ]);
            alert("Enviado"); location.reload();
        } else {
            alert("No existe el usuario.");
        }
    }

    function abrirEditor() {
        toggleAuth('register');
        document.getElementById('form-title').innerText = "Editar Perfil";
        document.getElementById('reg-user').value = currentUser.usuario;
        document.getElementById('reg-nom').value = currentUser.nombre;
        document.getElementById('reg-ape').value = currentUser.apellido;
        document.getElementById('reg-tel').value = currentUser.telefono;
        if(currentUser.foto) {
            document.getElementById('img-preview').src = currentUser.foto;
            document.getElementById('img-preview').style.display = 'block';
            document.getElementById('icon-cam').style.display = 'none';
        }
    }
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDxdjJ1HyJoVgeP6NFoS2i4va-tdRjrJIA&libraries=places" async defer></script>
</body>
</html>
