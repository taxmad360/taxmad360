<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LiveMad – Premium App</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { --blue: #00B5FF; --dark: #112F5C; --bg-app: #ffffff; --input-bg: #f3f4f6; }
        body { background: #001a3d; font-family: "Montserrat", sans-serif; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        .mobile-container { width: 100%; max-width: 414px; background: var(--bg-app); position: relative; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 40px rgba(0,0,0,0.5); }
        
        /* Pantalla de Autenticación */
        #auth-screen { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; padding: 40px; background: #001a3d; color: white; z-index: 1000; text-align: center; }
        .input-auth { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: white; outline: none; font-size: 16px; }
        
        /* App Principal */
        #main-app { display: none; flex-direction: column; height: 100%; background: white; overflow-y: auto; }
        .user-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .logo-txt { font-weight: 800; font-size: 20px; color: var(--dark); }
        .logo-txt span { color: var(--blue); }

        .form-content { padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .input-group { position: relative; }
        .input-group label { display: block; font-size: 10px; font-weight: 700; color: var(--dark); margin-bottom: 4px; margin-left: 5px; text-transform: uppercase; }
        .input-group input { width: 100%; padding: 14px 45px 14px 15px; border-radius: 12px; background: var(--input-bg); border: 1px solid #e5e7eb; font-size: 14px; font-weight: 500; color: #333; outline: none; }
        .input-group i { position: absolute; right: 15px; top: 35px; color: var(--blue); font-size: 18px; }

        #map { width: 100%; height: 220px; background: #f0f0f0; margin-top: 10px; border-radius: 15px; }
        
        .info-card { background: #f9fafb; margin: 15px 20px; padding: 15px; border-radius: 15px; border: 1px solid #eee; display: none; }
        .price-val { font-size: 28px; font-weight: 800; color: var(--dark); text-align: center; display: block; }
        .tarifa-badge { font-size: 10px; background: var(--blue); color: white; padding: 2px 8px; border-radius: 10px; font-weight: 700; margin-bottom: 5px; display: inline-block; }

        .btn-ver-precio { background: linear-gradient(90deg, #38bdf8 0%, #4f46e5 100%); color: white; padding: 18px; border-radius: 14px; width: 90%; margin: 10px auto; font-weight: 700; text-align: center; cursor: pointer; border: none; transition: 0.3s; }

        /* WIDGET VIAJE ACTIVO */
        #active-trip-widget { display: none; position: absolute; bottom: 85px; left: 15px; right: 15px; background: #001a3d; border-radius: 20px; padding: 15px; z-index: 2000; box-shadow: 0 10px 40px rgba(0,0,0,0.6); color: white; border: 1px solid rgba(0,181,255,0.2); }
        .dr-avatar { width: 45px; height: 45px; border-radius: 12px; background: var(--blue); display: flex; align-items: center; justify-content: center; font-weight: 800; color: #001a3d; }
        .countdown-box { background: rgba(0, 181, 255, 0.1); padding: 5px 12px; border-radius: 10px; text-align: center; min-width: 60px; }
        .btn-contact { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; font-size: 11px; flex: 1; text-align: center; color: white; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<div class="mobile-container">
    <div id="auth-screen">
        <div style="font-size: 35px; font-weight: 800; margin-bottom: 40px;">Live<span style="color:var(--blue)">Mad</span></div>
        <input type="text" id="user-login" placeholder="Usuario" class="input-auth">
        <input type="password" id="pass-login" placeholder="Contraseña" class="input-auth">
        <button onclick="intentarAcceso()" class="btn-ver-precio" style="width: 100%; margin-top: 20px;">INICIAR SESIÓN</button>
    </div>

    <div id="main-app">
        <header class="user-header">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-gray-200 flex items-center justify-center font-bold" id="user-initial">D</div>
                <div>
                    <p style="font-size: 9px; color: #aaa; margin:0; font-weight:700;">PREMIUM MEMBER</p>
                    <h2 id="user-display-name" style="font-size: 13px; font-weight: 700; margin:0;">Dani Martínez</h2>
                </div>
            </div>
            <div class="logo-txt">Live<span>Mad</span></div>
        </header>

        <div class="form-content">
            <div class="input-group"><label>Recogida</label><input type="text" id="origin" placeholder="¿Dónde te buscamos?"><i class="fa-solid fa-location-crosshairs" onclick="geolocalizar()"></i></div>
            <div class="input-group"><label>Destino</label><input type="text" id="destination" placeholder="¿A dónde vas?"><i class="fa-solid fa-flag-checkered"></i></div>
            <div class="input-group"><label>Fecha y Hora</label><input type="datetime-local" id="fechaHora"><i class="fa-solid fa-calendar-day"></i></div>
        </div>

        <div id="map"></div>

        <div id="info-resumen" class="info-card">
            <div id="tarifa-tag" class="tarifa-badge">TARIFA ESTÁNDAR</div>
            <span id="precio-txt" class="price-val">0.00€</span>
            <div class="flex justify-between text-[11px] text-gray-500 mt-2">
                <span><i class="fa-solid fa-route mr-1"></i> <span id="dist-txt">0 km</span></span>
                <span><i class="fa-solid fa-clock mr-1"></i> <span id="time-txt">0 min</span></span>
            </div>
        </div>

        <button id="btnAction" class="btn-ver-precio" onclick="procesarViaje()">CALCULAR PRECIO</button>

        <div id="active-trip-widget">
            <div class="flex justify-between items-center mb-4">
                <div class="flex gap-3 items-center">
                    <div id="dr-avatar" class="dr-avatar">A</div>
                    <div>
                        <div id="dr-name" class="text-sm font-bold">Buscando...</div>
                        <div id="dr-vehicle" class="text-[9px] text-sky-400 font-bold uppercase">Asignando unidad</div>
                    </div>
                </div>
                <div class="countdown-box">
                    <div id="timer" class="text-lg font-black">--:--</div>
                    <div id="timer-label" class="text-[7px] font-bold text-gray-400 uppercase">Minutos</div>
                </div>
            </div>
            <div class="flex gap-2">
                <a id="link-call" href="#" class="btn-contact"><i class="fa-solid fa-phone text-sky-400 mr-2"></i>Llamar</a>
                <a id="link-chat" href="#" class="btn-contact"><i class="fa-solid fa-comment text-sky-400 mr-2"></i>Mensaje</a>
            </div>
        </div>

        <nav class="h-20 bg-white border-t flex justify-around items-center mt-auto">
            <div class="text-center text-blue-500 text-[10px] font-bold"><i class="fa-solid fa-house text-xl block mb-1"></i>Home</div>
            <div class="text-center text-gray-400 text-[10px] font-bold"><i class="fa-solid fa-clock-rotate-left text-xl block mb-1"></i>Reservas</div>
            <div class="text-center text-gray-400 text-[10px] font-bold"><i class="fa-solid fa-user text-xl block mb-1"></i>Perfil</div>
        </nav>
    </div>
</div>

<script>
    const S_URL = 'https://asqglwuasvpwstyzvujy.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFzcWdsd2xnZ3F4YW55cWtzdXNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExNDc1NjUsImV4cCI6MjA4NjcyMzU2NX0.nFCvgWihLakBxfXX32NuXjHdJXCH5IYVfddoyehbkHg';
    const _supabase = supabase.createClient(S_URL, S_KEY);

    let map, directionsRenderer, directionsService, ultimoCalculo = null, timerInt = null;

    function intentarAcceso() {
        const u = document.getElementById('user-login').value;
        const p = document.getElementById('pass-login').value;
        if (u === 'admin' && p === '1234') {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            initMap();
        } else { alert("Error de acceso"); }
    }

    function initMap() {
        directionsService = new google.maps.DirectionsService();
        directionsRenderer = new google.maps.DirectionsRenderer();
        map = new google.maps.Map(document.getElementById('map'), { center: {lat: 40.41, lng: -3.70}, zoom: 14, disableDefaultUI: true });
        directionsRenderer.setMap(map);
        new google.maps.places.Autocomplete(document.getElementById('origin'));
        new google.maps.places.Autocomplete(document.getElementById('destination'));
    }

    async function procesarViaje() {
        const btn = document.getElementById('btnAction');
        const o = document.getElementById('origin').value;
        const d = document.getElementById('destination').value;
        const fh = document.getElementById('fechaHora').value;

        if (!ultimoCalculo) {
            btn.innerText = "CALCULANDO...";
            directionsService.route({ origin: o, destination: d, travelMode: 'DRIVING' }, (res, status) => {
                if(status === 'OK') {
                    directionsRenderer.setDirections(res);
                    const total = (6 + (res.routes[0].legs[0].distance.value/1000 * 1.45)).toFixed(2);
                    ultimoCalculo = { o, d, p: total, f: fh };
                    document.getElementById('precio-txt').innerText = total + "€";
                    document.getElementById('info-resumen').style.display = 'block';
                    btn.innerText = "CONFIRMAR RESERVA";
                }
            });
        } else {
            btn.disabled = true;
            const { data, error } = await _supabase.from('viajes').insert([{
                cliente_nombre: "Dani Martínez", origen: o, destino: d, precio: parseFloat(ultimoCalculo.p), fecha_reserva: fh, estado: 'pendiente'
            }]).select();

            if (!error) {
                alert("¡Buscando conductor!");
                iniciarMonitoreo(data[0].id);
                btn.style.display = 'none';
            }
        }
    }

    function iniciarMonitoreo(id) {
        _supabase.channel('tracking').on('postgres_changes', { event: 'UPDATE', table: 'viajes', filter: `id=eq.${id}` }, payload => {
            actualizarUI(payload.new);
        }).subscribe();
    }

    async function actualizarUI(viaje) {
        const widget = document.getElementById('active-trip-widget');
        widget.style.display = 'block';

        if (viaje.estado === 'aceptado') {
            const { data: dr } = await _supabase.from('Drivers').select('*').eq('id', viaje.driver_id).single();
            document.getElementById('dr-name').innerText = dr.nombre;
            document.getElementById('dr-vehicle').innerText = `${dr.marca_v} • ${dr.matricula}`;
            document.getElementById('dr-avatar').innerText = dr.nombre[0];
            document.getElementById('link-call').href = `tel:${dr.telefono}`;
            iniciarContador(5);
        } else if (viaje.estado === 'en_punto') {
            document.getElementById('timer').innerText = "00:00";
            alert("¡Tu conductor ha llegado!");
        } else if (viaje.estado === 'en_curso') {
            document.getElementById('timer').innerText = "RUTA";
        } else if (viaje.estado === 'finalizado') {
            alert("Servicio Finalizado. ¡Gracias!");
            location.reload();
        }
    }

    function iniciarContador(min) {
        let seg = min * 60;
        if(timerInt) clearInterval(timerInt);
        timerInt = setInterval(() => {
            seg--;
            let m = Math.floor(seg/60), s = seg%60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
            if(seg <= 0) clearInterval(timerInt);
        }, 1000);
    }
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDxdjJ1HyJoVgeP6NFoS2i4va-tdRjrJIA&libraries=places" async defer></script>
</body>
</html>
