<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TaxMad – Premium App</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Roboto:wght@400;500&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { 
            --neon-green: #39FF14; 
            --neon-cyan: #00D1FF; 
            --neon-purple: #BC00FF;
            --bg-black: #000000;
            --surface: #121212;
        }

        body { 
            background: var(--bg-black); 
            font-family: "Roboto", sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            height: 100vh; 
            color: white;
            overflow: hidden; 
        }
        
        h1, h2, .logo-txt { font-family: "Montserrat", sans-serif; }
        .price-txt { font-family: "Space Mono", monospace; }

        .mobile-container { 
            width: 100%; 
            max-width: 414px; 
            background: var(--bg-black); 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }
        
        .screen { display: none; flex-direction: column; height: 100%; overflow-y: auto; padding-bottom: 110px; }
        .screen.active { display: flex; }

        /* Efectos de Neón */
        .neon-border-cyan { border: 1px solid rgba(0, 209, 255, 0.3); box-shadow: 0 0 10px rgba(0, 209, 255, 0.1); }
        .neon-glow-green { box-shadow: 0 0 15px rgba(57, 255, 20, 0.4); }
        .neon-text-purple { color: var(--neon-purple); text-shadow: 0 0 5px rgba(188, 0, 255, 0.5); }

        #auth-screen { 
            position: absolute; inset: 0; display: flex; flex-direction: column; 
            justify-content: center; padding: 40px; background: var(--bg-black); 
            z-index: 5000; text-align: center; 
        }

        .input-auth { 
            width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.1); background: var(--surface); 
            color: white; outline: none; transition: 0.3s;
        }
        .input-auth:focus { border-color: var(--neon-cyan); }
        
        .photo-picker { 
            width: 110px; height: 110px; border-radius: 50%; background: var(--surface); 
            border: 2px solid var(--neon-purple); margin: 0 auto 20px; 
            display: flex; align-items: center; justify-content: center; overflow: hidden; 
        }

        .user-header { 
            padding: 20px; display: flex; justify-content: space-between; 
            align-items: center; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 4000; 
        }
        .logo-txt { font-weight: 800; font-size: 22px; italic; }
        .logo-txt span { color: var(--neon-cyan); }

        .taxcoin-card { 
            background: linear-gradient(90deg, #BC00FF 0%, #00D1FF 100%); 
            margin: 15px 20px; padding: 20px; border-radius: 20px; color: white; 
            display: flex; justify-content: space-between; align-items: center; 
        }

        .input-group label { 
            display: block; font-size: 10px; font-weight: 800; color: var(--neon-cyan); 
            margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px;
        }
        .input-group input { 
            width: 100%; padding: 14px 15px; border-radius: 12px; 
            background: var(--surface); border: 1px solid rgba(255,255,255,0.05); 
            color: white; outline: none; 
        }

        .opt-btn { 
            flex: 1; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); 
            background: var(--surface); font-size: 10px; font-weight: 800; 
            text-transform: uppercase; text-align: center; color: #666; transition: 0.3s; 
        }
        .opt-btn.active { border-color: var(--neon-green); color: var(--neon-green); box-shadow: 0 0 10px rgba(57, 255, 20, 0.2); }

        #map { width: 100%; height: 250px; background: #111; border-radius: 20px; margin: 15px 0; border: 1px solid rgba(255,255,255,0.1); }
        
        .btn-main { 
            background: var(--neon-green); color: black; padding: 18px; 
            border-radius: 16px; font-weight: 800; text-align: center; 
            cursor: pointer; width: 100%; font-family: "Montserrat";
            text-transform: uppercase; letter-spacing: 1px;
        }
        
        .trip-item { background: var(--surface); padding: 15px; border-radius: 16px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }

        nav { 
            position: fixed; bottom: 0; width: 100%; max-width: 414px; height: 85px; 
            background: rgba(0,0,0,0.9); border-top: 1px solid rgba(255,255,255,0.1); 
            display: flex; justify-content: space-around; align-items: center; z-index: 6000; 
        }
        .nav-btn { color: #444; text-align: center; transition: 0.3s; }
        .nav-btn.active { color: var(--neon-cyan); }
    </style>
</head>
<body>

<div class="mobile-container">
    
    <header id="app-header" class="user-header hidden">
        <div class="flex items-center gap-3">
            <div class="p-[2px] rounded-full bg-gradient-to-tr from-purple-600 to-cyan-400">
                <img id="u-img" src="" class="w-11 h-11 rounded-full object-cover bg-black" onclick="showTab('perfil')">
            </div>
            <div>
                <p class="text-[8px] font-black text-cyan-400 uppercase tracking-widest">Premium User</p>
                <h2 id="u-name" class="text-sm font-bold">...</h2>
            </div>
        </div>
        <div class="logo-txt italic text-white">TX<span>MD</span></div>
    </header>

    <div id="auth-screen">
        <button id="btn-close-profile" onclick="showTab('home')" class="hidden absolute top-5 right-5 text-gray-500 text-2xl">
            <i class="fa-solid fa-circle-xmark"></i>
        </button>

        <div id="auth-content">
            <div class="mb-10">
                <h1 class="text-5xl font-black italic text-white">TX<span class="text-cyan-400">MD</span></h1>
                <p class="text-[10px] tracking-[6px] text-purple-500 uppercase font-bold">Premium Mobility</p>
            </div>

            <div id="login-box">
                <input type="text" id="user-login" placeholder="Usuario" class="input-auth">
                <input type="password" id="pass-login" placeholder="Contraseña" class="input-auth">
                <button onclick="intentarAcceso()" class="btn-main neon-glow-green mt-4">ENTRAR</button>
                <p class="mt-8 text-sm text-gray-500">¿Nuevo aquí? <span class="text-cyan-400 font-bold cursor-pointer" onclick="toggleAuth('register')">Únete a la élite</span></p>
            </div>

            <div id="register-box" class="hidden">
                <div class="photo-picker" onclick="document.getElementById('reg-foto-input').click()">
                    <i class="fa-solid fa-camera text-2xl text-purple-500" id="icon-cam"></i>
                    <img id="img-preview" src="" class="hidden w-full h-full object-cover">
                </div>
                <input type="file" id="reg-foto-input" accept="image/*" class="hidden" onchange="previewImagen(this)">
                
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="reg-nom" placeholder="Nombre" class="input-auth">
                    <input type="text" id="reg-ape" placeholder="Apellido" class="input-auth">
                </div>
                <input type="text" id="reg-user" placeholder="Usuario" class="input-auth">
                <input type="password" id="reg-pass" placeholder="Contraseña" class="input-auth">
                
                <button onclick="registrarUsuario()" class="btn-main neon-glow-green mt-2">CONFIRMAR REGISTRO</button>
                <button id="btn-logout" onclick="cerrarSesion()" class="mt-6 text-red-500 font-bold text-xs uppercase hidden">Cerrar Sesión</button>
                <p class="mt-4 text-xs text-gray-500 cursor-pointer" onclick="toggleAuth('login')">Volver</p>
            </div>
        </div>
    </div>

    <div id="main-app" class="screen">
        <div class="taxcoin-card">
            <div>
                <p class="text-[10px] font-bold opacity-80 uppercase mb-1">Taxcoins Balance</p>
                <p class="text-3xl font-black italic price-txt" id="u-tc">0.00</p>
            </div>
            <i class="fa-solid fa-bolt-lightning text-3xl text-white/40"></i>
        </div>

        <div class="px-6 mt-2 space-y-4">
            <div class="input-group">
                <label><i class="fa-solid fa-location-dot mr-1"></i> Punto de Recogida</label>
                <div class="relative">
                    <input type="text" id="origin" placeholder="Ej: Aeropuerto Madrid">
                    <div class="absolute right-3 top-3 text-cyan-400" onclick="obtenerUbicacionActual()"><i class="fa-solid fa-crosshairs"></i></div>
                </div>
            </div>
            <div class="input-group">
                <label><i class="fa-solid fa-flag-checkered mr-1"></i> Destino Final</label>
                <input type="text" id="destination" placeholder="¿A dónde nos dirigimos?">
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="option-selector flex gap-2">
                    <div id="pay-card" class="opt-btn active" onclick="setOpt('pay', 'tarjeta')">Tarjeta</div>
                    <div id="pay-cash" class="opt-btn" onclick="setOpt('pay', 'efectivo')">Cash</div>
                </div>
                <div class="option-selector flex gap-2">
                    <div id="rate-fixed" class="opt-btn active" onclick="setOpt('rate', 'cerrado')">Fijo</div>
                    <div id="rate-meter" class="opt-btn" onclick="setOpt('rate', 'taximetro')">Taxímetro</div>
                </div>
            </div>

            <div id="map"></div>
            
            <div id="info-resumen" class="hidden p-4 rounded-2xl bg-surface border border-white/5 text-center">
                <p id="label-precio" class="text-[10px] font-bold text-purple-400 uppercase tracking-widest mb-1">Costo Estimado</p>
                <span id="precio-txt" class="text-3xl font-black price-txt text-white">0.00€</span>
            </div>

            <button id="btnAction" class="btn-main neon-glow-green" onclick="procesarViaje()">CALCULAR TARIFA</button>
        </div>
    </div>

    <div id="hucha-screen" class="screen">
        <div class="p-6">
            <h1 class="text-3xl font-black italic mb-6">Mis <span class="text-cyan-400">Viajes</span></h1>
            <div id="lista-viajes" class="space-y-3"></div>
        </div>
    </div>

    <nav id="bottom-nav" class="hidden">
        <div onclick="showTab('home')" id="n-home" class="nav-btn active"><i class="fa-solid fa-map-location-dot text-xl mb-1"></i><p class="text-[9px] font-bold">MAPA</p></div>
        <div onclick="showTab('hucha')" id="n-hucha" class="nav-btn"><i class="fa-solid fa-clock-rotate-left text-xl mb-1"></i><p class="text-[9px] font-bold">HISTORIAL</p></div>
        <div onclick="showTab('perfil')" id="n-perfil" class="nav-btn"><i class="fa-solid fa-sliders text-xl mb-1"></i><p class="text-[9px] font-bold">AJUSTES</p></div>
    </nav>
</div>

<script>
    const S_URL = 'https://wdxtnvblolhqipscpxer.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndkeHRudmJsb2xocWlwc2NweGVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NzQxNzIsImV4cCI6MjA4ODA1MDE3Mn0.xO19SVN8gowDATLWDEpyakcZXbdGg2Iex8C-ZEWL2dM';
    const _supabase = supabase.createClient(S_URL, S_KEY);

    let currentUser = null, ultimoCalculo = null;
    let selectedPay = 'tarjeta', selectedRate = 'cerrado';
    let map, directionsRenderer, directionsService;

    // ESTILO DARK PARA EL MAPA
    const mapStyle = [
        { "elementType": "geometry", "stylers": [{ "color": "#212121" }] },
        { "elementType": "labels.text.fill", "stylers": [{ "color": "#757575" }] },
        { "featureType": "road", "elementType": "geometry", "stylers": [{ "color": "#2c2c2c" }] },
        { "featureType": "water", "elementType": "geometry", "stylers": [{ "color": "#000000" }] }
    ];

    async function intentarAcceso() {
        const u = document.getElementById('user-login').value;
        const p = document.getElementById('pass-login').value;
        const { data } = await _supabase.from('clientes').select('*').eq('usuario', u).single();
        if (data && data.password === p) {
            currentUser = data;
            document.getElementById('bottom-nav').classList.remove('hidden');
            document.getElementById('app-header').classList.remove('hidden');
            showTab('home');
            actualizarUI();
            initMap();
        } else alert("Acceso denegado");
    }

    function initMap() {
        directionsService = new google.maps.DirectionsService();
        directionsRenderer = new google.maps.DirectionsRenderer({ 
            polylineOptions: { strokeColor: "#00D1FF", strokeWeight: 6 },
            suppressMarkers: false 
        });
        map = new google.maps.Map(document.getElementById('map'), { 
            center: {lat: 40.41, lng: -3.70}, 
            zoom: 14, 
            styles: mapStyle, 
            disableDefaultUI: true 
        });
        directionsRenderer.setMap(map);
        new google.maps.places.Autocomplete(document.getElementById('origin'));
        new google.maps.places.Autocomplete(document.getElementById('destination'));
    }

    async function procesarViaje() {
        if(!ultimoCalculo) {
            const o = document.getElementById('origin').value;
            const d = document.getElementById('destination').value;
            if(!o || !d) return alert("Indica ruta");

            directionsService.route({ origin: o, destination: d, travelMode: 'DRIVING' }, (res, status) => {
                if(status === 'OK') {
                    directionsRenderer.setDirections(res);
                    const kms = res.routes[0].legs[0].distance.value / 1000;
                    const precio = (5.5 + (kms * 1.45)).toFixed(2);
                    ultimoCalculo = precio;
                    document.getElementById('precio-txt').innerText = precio + "€";
                    document.getElementById('info-resumen').classList.remove('hidden');
                    document.getElementById('btnAction').innerText = "CONFIRMAR TXMD";
                }
            });
        } else {
            // Lógica de guardado en Supabase (idéntica a la anterior)
            alert("Reserva enviada al sistema");
            ultimoCalculo = null;
        }
    }

    function showTab(t) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('auth-screen').classList.add('hidden');
        
        if(t === 'home') { 
            document.getElementById('main-app').classList.add('active'); 
            document.getElementById('n-home').classList.add('active'); 
        } else if(t === 'hucha') { 
            document.getElementById('hucha-screen').classList.add('active'); 
            document.getElementById('n-hucha').classList.add('active'); 
            cargarHistorial();
        } else if(t === 'perfil') { 
            document.getElementById('auth-screen').classList.remove('hidden');
            toggleAuth('register');
        }
    }

    function toggleAuth(v) {
        document.getElementById('login-box').classList.toggle('hidden', v !== 'login');
        document.getElementById('register-box').classList.toggle('hidden', v !== 'register');
        if(currentUser) document.getElementById('btn-logout').classList.remove('hidden');
    }

    function actualizarUI() {
        document.getElementById('u-name').innerText = currentUser.nombre;
        document.getElementById('u-tc').innerText = (currentUser.taxcoins || 0).toFixed(2);
        document.getElementById('u-img').src = currentUser.foto || 'https://via.placeholder.com/100';
    }

    function previewImagen(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('img-preview').src = e.target.result;
                document.getElementById('img-preview').classList.remove('hidden');
                document.getElementById('icon-cam').classList.add('hidden');
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    function setOpt(type, val) {
        if(type === 'pay') {
            selectedPay = val;
            document.getElementById('pay-card').classList.toggle('active', val === 'tarjeta');
            document.getElementById('pay-cash').classList.toggle('active', val === 'efectivo');
        } else {
            selectedRate = val;
            document.getElementById('rate-fixed').classList.toggle('active', val === 'cerrado');
            document.getElementById('rate-meter').classList.toggle('active', val === 'taximetro');
        }
    }

    function cerrarSesion() { localStorage.clear(); location.reload(); }
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDxdjJ1HyJoVgeP6NFoS2i4va-tdRjrJIA&libraries=places" async defer></script>
</body>
</html>
