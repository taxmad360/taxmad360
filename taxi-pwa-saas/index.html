<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TaxMad – Premium App</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { --blue: #00B5FF; --dark: #001a3d; --bg-app: #ffffff; --input-bg: #f3f4f6; }
        body { background: #000c1d; font-family: "Montserrat", sans-serif; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        
        .mobile-container { width: 100%; max-width: 414px; background: var(--bg-app); position: relative; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        
        .screen { display: none; flex-direction: column; height: 100%; overflow-y: auto; padding-bottom: 100px; }
        .screen.active { display: flex; }

        #auth-screen { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; padding: 40px; background: var(--dark); color: white; z-index: 5000; text-align: center; }
        #auth-screen.as-profile { z-index: 3000; padding-bottom: 120px; background: #f8fafc; color: #334155; }

        .input-auth { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; outline: none; font-size: 14px; }
        .as-profile .input-auth { background: white; border: 1px solid #ddd; color: #334155; }
        
        .photo-picker { width: 110px; height: 110px; border-radius: 50%; background: #e2e8f0; border: 3px solid var(--blue); margin: 0 auto 20px; position: relative; cursor: pointer; display: flex; align-items: center; justify-content: center; overflow: hidden; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .photo-picker img { width: 100%; height: 100%; object-fit: cover; }

        .user-header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f0f0f0; background: white; position: sticky; top: 0; z-index: 4000; }
        .logo-txt { font-weight: 800; font-size: 20px; color: var(--dark); }
        .logo-txt span { color: var(--blue); }

        .taxcoin-card { background: linear-gradient(135deg, #001a3d 0%, #004e92 100%); margin: 15px 20px; padding: 20px; border-radius: 24px; color: white; display: flex; justify-content: space-between; align-items: center; }

        .input-group { position: relative; margin-bottom: 12px; }
        .input-group label { display: block; font-size: 10px; font-weight: 800; color: var(--dark); margin-bottom: 6px; text-transform: uppercase; opacity: 0.6; }
        .input-group input { width: 100%; padding: 14px 15px; border-radius: 14px; background: var(--input-bg); border: 1px solid #eee; font-size: 14px; outline: none; padding-right: 45px; }

        .btn-gps { position: absolute; right: 10px; bottom: 8px; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; color: var(--blue); cursor: pointer; border-radius: 10px; transition: all 0.2s; }
        .btn-gps:active { transform: scale(0.9); background: #e0f2fe; }

        #map { width: 100%; height: 200px; background: #e5e7eb; border-radius: 20px; margin: 10px 0; }

        .btn-main { background: linear-gradient(90deg, #00B5FF 0%, #0072ff 100%); color: white; padding: 18px; border-radius: 16px; font-weight: 800; text-align: center; cursor: pointer; border: none; width: 100%; }
        
        .trip-item { background: white; padding: 15px; border-radius: 20px; margin-bottom: 10px; border: 1px solid #eee; }

        nav { position: fixed; bottom: 0; width: 100%; max-width: 414px; height: 85px; background: white; border-top: 1px solid #eee; display: flex; justify-content: space-around; align-items: center; z-index: 6000; }
        .nav-btn { color: #cbd5e1; cursor: pointer; text-align: center; }
        .nav-btn.active { color: var(--blue); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="mobile-container">
    
    <header id="app-header" class="user-header hidden">
        <div class="flex items-center gap-3">
            <img id="u-img" src="" class="w-11 h-11 rounded-full border-2 border-sky-400 object-cover bg-gray-100" onclick="showTab('perfil')">
            <div>
                <p class="text-[8px] font-black text-gray-400 uppercase tracking-widest">Premium User</p>
                <h2 id="u-name" class="text-sm font-bold text-slate-800">...</h2>
            </div>
        </div>
        <div class="logo-txt">Tax<span>Mad</span></div>
    </header>

    <div id="auth-screen">
        <button id="btn-close-profile" onclick="showTab('home')" class="hidden absolute top-5 right-5 text-gray-400 text-2xl z-[5001]">
            <i class="fa-solid fa-circle-xmark"></i>
        </button>

        <div id="auth-content">
            <div class="mb-10" id="auth-logo">
                <h1 class="text-4xl font-black italic">Tax<span class="text-sky-400">Mad</span></h1>
                <p class="text-[10px] tracking-[4px] opacity-50 uppercase">Premium Mobility</p>
            </div>

            <div id="login-box">
                <input type="text" id="user-login" placeholder="Usuario" class="input-auth">
                <input type="password" id="pass-login" placeholder="Contraseña" class="input-auth">
                <button onclick="intentarAcceso()" class="btn-main mt-4">ENTRAR</button>
                <p class="mt-6 text-sm text-gray-400">¿Nuevo aquí? <span class="text-sky-400 font-bold cursor-pointer" onclick="toggleAuth('register')">Crea una cuenta</span></p>
            </div>

            <div id="register-box" class="hidden">
                <h2 id="reg-title" class="text-xl font-bold mb-4">CREAR CUENTA</h2>
                <div class="photo-picker" onclick="document.getElementById('reg-foto-input').click()">
                    <i class="fa-solid fa-camera text-2xl text-sky-400" id="icon-cam"></i>
                    <img id="img-preview" src="" class="hidden">
                </div>
                <input type="file" id="reg-foto-input" accept="image/*" class="hidden" onchange="previewImagen(this)">
                
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="reg-nom" placeholder="Nombre" class="input-auth">
                    <input type="text" id="reg-ape" placeholder="Apellido" class="input-auth">
                </div>
                <input type="text" id="reg-user" placeholder="Usuario" class="input-auth">
                <input type="password" id="reg-pass" placeholder="Contraseña" class="input-auth">
                <input type="tel" id="reg-tel" placeholder="Teléfono" class="input-auth">
                
                <button id="btn-save-reg" onclick="registrarUsuario()" class="btn-main">GUARDAR DATOS</button>
                
                <button id="btn-logout" onclick="cerrarSesion()" class="mt-8 text-red-500 font-bold text-xs uppercase tracking-widest hidden flex items-center justify-center gap-2 w-full">
                    <i class="fa-solid fa-power-off"></i> Cerrar Sesión
                </button>
                <p id="btn-back-login" class="mt-4 text-xs text-gray-400 cursor-pointer" onclick="toggleAuth('login')">Volver al inicio</p>
            </div>
        </div>
    </div>

    <div id="main-app" class="screen">
        <div class="taxcoin-card">
            <div>
                <p class="text-[10px] font-bold opacity-70 uppercase mb-1">Taxcoins</p>
                <p class="text-2xl font-black text-sky-400"><span id="u-tc">0.00</span> <small class="text-xs">TC</small></p>
            </div>
            <i class="fa-solid fa-crown text-3xl opacity-20"></i>
        </div>

        <div class="px-5 mt-4 space-y-4">
            <div class="input-group">
                <label>Recogida</label>
                <input type="text" id="origin" placeholder="¿Dónde recogemos?">
                <div class="btn-gps" onclick="obtenerUbicacionActual()">
                    <i class="fa-solid fa-crosshairs text-lg"></i>
                </div>
            </div>
            <div class="input-group">
                <label>Destino</label>
                <input type="text" id="destination" placeholder="¿A dónde vas?">
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="input-group">
                    <label>Fecha</label>
                    <input type="date" id="res-date">
                </div>
                <div class="input-group">
                    <label>Hora</label>
                    <input type="time" id="res-time">
                </div>
            </div>

            <div id="map"></div>
            <div id="info-resumen" class="hidden bg-sky-50 p-4 rounded-2xl text-center">
                <p class="text-[10px] font-black text-sky-600 uppercase">Precio Estimado</p>
                <span id="precio-txt" class="text-3xl font-black text-slate-800">0.00€</span>
            </div>
            <button id="btnAction" class="btn-main mb-6" onclick="procesarViaje()">CALCULAR PRECIO</button>
        </div>
    </div>

    <div id="hucha-screen" class="screen">
        <div class="p-6">
            <h1 class="text-3xl font-black italic mb-2">Mis <span class="text-sky-500">Viajes</span></h1>
            <p class="text-gray-400 text-xs mb-6">Historial de reservas y Taxcoins</p>
            <div id="lista-viajes" class="space-y-3">
                <p class="text-center text-gray-400 py-10">Cargando historial...</p>
            </div>
        </div>
    </div>

    <nav id="bottom-nav" class="hidden">
        <div onclick="showTab('home')" id="n-home" class="nav-btn active">
            <i class="fa-solid fa-compass text-xl block mb-1"></i>
            <span class="text-[9px] font-bold uppercase">Reservar</span>
        </div>
        <div onclick="showTab('hucha')" id="n-hucha" class="nav-btn">
            <i class="fa-solid fa-receipt text-xl block mb-1"></i>
            <span class="text-[9px] font-bold uppercase">Viajes</span>
        </div>
        <div onclick="showTab('perfil')" id="n-perfil" class="nav-btn">
            <i class="fa-solid fa-user-gear text-xl block mb-1"></i>
            <span class="text-[9px] font-bold uppercase">Perfil</span>
        </div>
    </nav>
</div>

<script>
    const S_URL = 'https://wdxtnvblolhqipscpxer.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndkeHRudmJsb2xocWlwc2NweGVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NzQxNzIsImV4cCI6MjA4ODA1MDE3Mn0.xO19SVN8gowDATLWDEpyakcZXbdGg2Iex8C-ZEWL2dM';
    const _supabase = supabase.createClient(S_URL, S_KEY);

    let currentUser = null, ultimoCalculo = null;

    function cerrarSesion() {
        localStorage.removeItem('taxmad_user');
        location.reload();
    }

    async function registrarUsuario() {
        const btn = document.getElementById('btn-save-reg');
        const u = document.getElementById('reg-user').value;
        const p = document.getElementById('reg-pass').value;
        const n = document.getElementById('reg-nom').value;

        if(!u || !p || !n) return alert("Completa los campos obligatorios");
        btn.disabled = true;

        const datos = { 
            nombre: n, 
            apellido: document.getElementById('reg-ape').value,
            usuario: u, 
            password: p, 
            telefono: document.getElementById('reg-tel').value,
            taxcoins: currentUser?.taxcoins || 0,
            foto: document.getElementById('img-preview').src || `https://ui-avatars.com/api/?name=${n}&background=00B5FF&color=fff`
        };

        const { error } = await _supabase.from('clientes').upsert([datos], {onConflict: 'usuario'});
        if(!error) {
            alert("¡Datos actualizados!");
            if(!currentUser) toggleAuth('login');
            else {
                const { data } = await _supabase.from('clientes').select('*').eq('usuario', u).single();
                currentUser = data;
                actualizarUI();
                showTab('home');
            }
        }
        btn.disabled = false;
    }

    async function intentarAcceso() {
        const u = document.getElementById('user-login').value;
        const p = document.getElementById('pass-login').value;
        const { data } = await _supabase.from('clientes').select('*').eq('usuario', u).single();
        
        if (data && data.password === p) {
            currentUser = data;
            document.getElementById('bottom-nav').classList.remove('hidden');
            document.getElementById('app-header').classList.remove('hidden');
            showTab('home');
            actualizarUI();
            initMap();
        } else {
            alert("Usuario o contraseña incorrectos");
        }
    }

    function actualizarUI() {
        document.getElementById('u-name').innerText = currentUser.nombre;
        document.getElementById('u-tc').innerText = (currentUser.taxcoins || 0).toFixed(2);
        document.getElementById('u-img').src = currentUser.foto;
    }

    // --- GEOLOCALIZACIÓN ---
    function obtenerUbicacionActual() {
        if (!navigator.geolocation) return alert("Tu navegador no soporta geolocalización");
        
        const btnIcon = document.querySelector('.btn-gps i');
        btnIcon.classList.add('fa-spin');

        navigator.geolocation.getCurrentPosition((pos) => {
            const latlng = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            const geocoder = new google.maps.Geocoder();
            
            geocoder.geocode({ location: latlng }, (results, status) => {
                btnIcon.classList.remove('fa-spin');
                if (status === "OK" && results[0]) {
                    document.getElementById('origin').value = results[0].formatted_address;
                } else {
                    alert("No pudimos obtener la dirección exacta");
                }
            });
        }, () => {
            btnIcon.classList.remove('fa-spin');
            alert("Error: Activa el GPS de tu móvil");
        });
    }

    let directionsService, directionsRenderer;
    function initMap() {
        if(typeof google === 'undefined') return;
        directionsService = new google.maps.DirectionsService();
        directionsRenderer = new google.maps.DirectionsRenderer({ polylineOptions: { strokeColor: "#00B5FF", strokeWeight: 5 }});
        const map = new google.maps.Map(document.getElementById('map'), { center: {lat: 40.41, lng: -3.70}, zoom: 12, disableDefaultUI: true });
        directionsRenderer.setMap(map);
        new google.maps.places.Autocomplete(document.getElementById('origin'));
        new google.maps.places.Autocomplete(document.getElementById('destination'));
    }

    async function procesarViaje() {
        const o = document.getElementById('origin').value;
        const d = document.getElementById('destination').value;
        const f = document.getElementById('res-date').value;
        const h = document.getElementById('res-time').value;
        if(!o || !d || !f || !h) return alert("Faltan datos");

        const fechaReserva = new Date(`${f}T${h}`);

        if(!ultimoCalculo) {
            directionsService.route({ origin: o, destination: d, travelMode: 'DRIVING' }, (res, status) => {
                if(status === 'OK') {
                    directionsRenderer.setDirections(res);
                    ultimoCalculo = (5.50 + ((res.routes[0].legs[0].distance.value / 1000) * 1.40)).toFixed(2);
                    document.getElementById('precio-txt').innerText = ultimoCalculo + "€";
                    document.getElementById('info-resumen').classList.remove('hidden');
                    document.getElementById('btnAction').innerText = "CONFIRMAR RESERVA";
                }
            });
        } else {
            const { error } = await _supabase.from('viajes').insert([{
                cliente_id: currentUser.id, 
                cliente_nombre: currentUser.nombre,
                origen: o, destino: d, precio: parseFloat(ultimoCalculo),
                estado: 'pendiente', fecha_reserva: fechaReserva.toISOString()
            }]);
            if(!error) { alert("¡Reserva confirmada!"); ultimoCalculo = null; showTab('hucha'); }
        }
    }

    async function showTab(t) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        
        const auth = document.getElementById('auth-screen');
        auth.classList.add('hidden');
        auth.classList.remove('as-profile');
        document.getElementById('btn-close-profile').classList.add('hidden');

        if(t === 'home') {
            document.getElementById('main-app').classList.add('active');
            document.getElementById('n-home').classList.add('active');
        } 
        else if(t === 'hucha') {
            document.getElementById('hucha-screen').classList.add('active');
            document.getElementById('n-hucha').classList.add('active');
            cargarHistorial();
        } 
        else if(t === 'perfil') {
            document.getElementById('n-perfil').classList.add('active');
            auth.classList.remove('hidden');
            auth.classList.add('as-profile');
            document.getElementById('btn-close-profile').classList.remove('hidden');
            toggleAuth('register');
        }
    }

    async function cargarHistorial() {
        const { data } = await _supabase.from('viajes').select('*').eq('cliente_id', currentUser.id).order('created_at', {ascending: false});
        const container = document.getElementById('lista-viajes');
        if(!data || data.length === 0) { container.innerHTML = "<p class='text-center opacity-40 py-10'>Sin viajes</p>"; return; }
        container.innerHTML = data.map(v => `
            <div class="trip-item">
                <div class="flex justify-between mb-2 text-[10px] font-bold">
                    <span class="text-sky-500">${new Date(v.fecha_reserva).toLocaleString()}</span>
                    <span class="uppercase bg-slate-100 px-2 py-1 rounded">${v.estado}</span>
                </div>
                <p class="text-[11px] truncate opacity-70">📍 ${v.origen}</p>
                <p class="text-[11px] truncate opacity-70">🏁 ${v.destino}</p>
                <p class="mt-2 font-black text-right">${v.precio.toFixed(2)}€</p>
            </div>
        `).join('');
    }

    function toggleAuth(v) {
        document.getElementById('auth-screen').classList.remove('hidden');
        document.getElementById('login-box').classList.toggle('hidden', v !== 'login');
        document.getElementById('register-box').classList.toggle('hidden', v !== 'register');
        
        if(v === 'register') {
            document.getElementById('auth-logo').classList.toggle('hidden', currentUser);
            document.getElementById('btn-back-login').classList.toggle('hidden', currentUser);
            document.getElementById('btn-logout').classList.toggle('hidden', !currentUser);
            document.getElementById('reg-title').innerText = currentUser ? "EDITAR MI PERFIL" : "CREAR CUENTA";
            if(currentUser) {
                document.getElementById('reg-nom').value = currentUser.nombre;
                document.getElementById('reg-ape').value = currentUser.apellido || "";
                document.getElementById('reg-user').value = currentUser.usuario;
                document.getElementById('reg-tel').value = currentUser.telefono;
                document.getElementById('img-preview').src = currentUser.foto;
                document.getElementById('img-preview').classList.remove('hidden');
                document.getElementById('icon-cam').classList.add('hidden');
            }
        }
    }

    function previewImagen(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('img-preview').src = e.target.result;
                document.getElementById('img-preview').classList.remove('hidden');
                document.getElementById('icon-cam').classList.add('hidden');
            }
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDxdjJ1HyJoVgeP6NFoS2i4va-tdRjrJIA&libraries=places" async defer></script>
</body>
</html>
