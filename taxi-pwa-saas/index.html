<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TaxMad – Premium TXMD</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #121212;
            --neon-green: #39FF14;
            --neon-blue: #00D1FF;
            --neon-purple: #BC00FF;
            --text-main: #ffffff;
            --border-radius: 16px;
        }

        body { background: var(--bg-color); font-family: "Montserrat", sans-serif; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; color: var(--text-main); }
        .mobile-container { width: 100%; max-width: 414px; background: var(--bg-color); position: relative; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.9); }
        .screen { display: none; flex-direction: column; height: 100%; overflow-y: auto; padding-bottom: 100px; }
        .screen.active { display: flex; }
        .header-gradient { background: linear-gradient(90deg, var(--neon-purple) 0%, var(--neon-blue) 50%, var(--neon-green) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
        .card-txmd { background-color: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: var(--border-radius); padding: 20px; }
        .btn-main { background-color: var(--neon-green); color: #000; padding: 18px; border-radius: var(--border-radius); font-weight: 800; text-align: center; cursor: pointer; border: none; width: 100%; text-transform: uppercase; box-shadow: 0 0 15px rgba(57, 255, 20, 0.3); transition: all 0.3s ease; }
        #auth-screen { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; padding: 40px; background: #000; z-index: 5000; text-align: center; }
        #auth-screen.as-profile { z-index: 3000; padding-bottom: 120px; }
        .input-auth { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 12px; border: 1px solid #333; background: #111; color: white; outline: none; }
        .photo-picker { width: 110px; height: 110px; border-radius: 50%; background: #111; border: 3px solid var(--neon-blue); margin: 0 auto 20px; position: relative; cursor: pointer; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .photo-picker img { width: 100%; height: 100%; object-fit: cover; }
        .user-header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; background: #000; position: sticky; top: 0; z-index: 4000; }
        .taxcoin-card { background: linear-gradient(135deg, #121212 0%, #000 100%); margin: 15px 20px; padding: 20px; border-radius: 24px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .input-group { position: relative; margin-bottom: 12px; }
        .input-group label { display: block; font-size: 10px; font-weight: 800; color: var(--neon-blue); margin-bottom: 6px; text-transform: uppercase; }
        .input-group input { width: 100%; padding: 14px 15px; border-radius: 14px; background: #111; border: 1px solid #333; color: white; outline: none; }
        .btn-gps { position: absolute; right: 10px; bottom: 8px; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; color: var(--neon-green); cursor: pointer; }
        .option-selector { display: flex; gap: 8px; margin-bottom: 15px; }
        .opt-btn { flex: 1; padding: 12px; border-radius: 14px; border: 1px solid #333; background: #111; font-size: 10px; font-weight: 800; text-align: center; cursor: pointer; color: #666; }
        .opt-btn.active { border-color: var(--neon-blue); background: rgba(0, 209, 255, 0.1); color: var(--neon-blue); }
        #map { width: 100%; height: 220px; background: #111; border-radius: 20px; margin: 10px 0; border: 1px solid #333; }
        .trip-item { background: var(--card-bg); padding: 15px; border-radius: 20px; margin-bottom: 10px; border: 1px solid #333; }
        nav { position: fixed; bottom: 0; width: 100%; max-width: 414px; height: 85px; background: #000; border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; z-index: 6000; }
        .nav-btn { color: #444; cursor: pointer; text-align: center; }
        .nav-btn.active { color: var(--neon-green); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="mobile-container">
    <header id="app-header" class="user-header hidden">
        <div class="flex items-center gap-3">
            <img id="u-img" src="" class="w-11 h-11 rounded-full border-2 border-[#BC00FF] object-cover bg-gray-900" onclick="showTab('perfil')">
            <div>
                <p class="text-[8px] font-black text-[#BC00FF] uppercase tracking-widest">Premium User</p>
                <h2 id="u-name" class="text-sm font-bold text-white">...</h2>
            </div>
        </div>
        <div class="font-black text-xl header-gradient">TaxMad</div>
    </header>

    <div id="auth-screen">
        <button id="btn-close-profile" onclick="showTab('home')" class="hidden absolute top-5 right-5 text-gray-600 text-2xl z-[5001]">
            <i class="fa-solid fa-circle-xmark"></i>
        </button>
        <div id="auth-content">
            <div class="mb-10">
                <h1 class="text-4xl font-black italic header-gradient">TaxMad</h1>
                <p class="text-[10px] tracking-[4px] opacity-50 uppercase text-white">Black Mobility</p>
            </div>
            <div id="login-box">
                <input type="text" id="user-login" placeholder="Usuario" class="input-auth">
                <input type="password" id="pass-login" placeholder="Contraseña" class="input-auth">
                <button onclick="intentarAcceso()" class="btn-main mt-4">ENTRAR</button>
                <p class="mt-6 text-sm text-gray-500">¿Nuevo aquí? <span class="text-[#00D1FF] font-bold cursor-pointer" onclick="toggleAuth('register')">Crea una cuenta</span></p>
            </div>
            <div id="register-box" class="hidden">
                <div class="photo-picker" onclick="document.getElementById('reg-foto-input').click()">
                    <i class="fa-solid fa-camera text-2xl text-[#00D1FF]" id="icon-cam"></i>
                    <img id="img-preview" src="" class="hidden">
                </div>
                <input type="file" id="reg-foto-input" accept="image/*" class="hidden" onchange="previewImagen(this)">
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="reg-nom" placeholder="Nombre" class="input-auth">
                    <input type="text" id="reg-ape" placeholder="Apellido" class="input-auth">
                </div>
                <input type="text" id="reg-user" placeholder="Usuario" class="input-auth">
                <input type="password" id="reg-pass" placeholder="Contraseña" class="input-auth">
                <input type="tel" id="reg-tel" placeholder="Teléfono" class="input-auth">
                <button onclick="registrarUsuario()" class="btn-main">GUARDAR DATOS</button>
                <button id="btn-logout" onclick="cerrarSesion()" class="mt-8 text-red-500 font-bold text-xs uppercase hidden w-full">Cerrar Sesión</button>
                <p id="btn-back-login" class="mt-4 text-xs text-gray-600 cursor-pointer" onclick="toggleAuth('login')">Volver al inicio</p>
            </div>
        </div>
    </div>

    <div id="main-app" class="screen">
        <div class="taxcoin-card">
            <div>
                <p class="text-[10px] font-bold text-[#39FF14] mb-1">Taxcoins</p>
                <p class="text-2xl font-black text-white"><span id="u-tc">0.00</span> <small class="text-xs text-gray-500">TC</small></p>
            </div>
            <i class="fa-solid fa-crown text-3xl text-[#39FF14] opacity-40"></i>
        </div>
        <div class="px-5 mt-4 space-y-4">
            <div class="input-group"><label>Recogida</label><input type="text" id="origin" placeholder="¿Dónde?"><div class="btn-gps" onclick="obtenerUbicacionActual()"><i class="fa-solid fa-crosshairs"></i></div></div>
            <div class="input-group"><label>Destino</label><input type="text" id="destination" placeholder="¿A dónde vas?"></div>
            <div class="grid grid-cols-2 gap-4">
                <div><label class="text-[10px] font-black text-gray-500 block mb-2">Pago</label>
                    <div class="option-selector"><div id="pay-card" class="opt-btn active" onclick="setOpt('pay', 'tarjeta')">Tarjeta</div><div id="pay-cash" class="opt-btn" onclick="setOpt('pay', 'efectivo')">Efectivo</div></div>
                </div>
                <div><label class="text-[10px] font-black text-gray-500 block mb-2">Tarifa</label>
                    <div class="option-selector"><div id="rate-fixed" class="opt-btn active" onclick="setOpt('rate', 'cerrado')">Cerrado</div><div id="rate-meter" class="opt-btn" onclick="setOpt('rate', 'taximetro')">Taxi</div></div>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div class="input-group"><label>Fecha</label><input type="date" id="res-date"></div>
                <div class="input-group"><label>Hora</label><input type="time" id="res-time"></div>
            </div>
            <div id="map"></div>
            <div id="info-resumen" class="hidden card-txmd text-center border-dashed border-[#39FF14]">
                <p id="label-precio" class="text-[10px] font-black text-[#39FF14]">Precio Cerrado</p>
                <span id="precio-txt" class="text-3xl font-black">0.00€</span>
            </div>
            <button id="btnAction" class="btn-main mb-6" onclick="procesarViaje()">CALCULAR PRECIO</button>
        </div>
    </div>

    <div id="hucha-screen" class="screen">
        <div class="p-6">
            <h1 class="text-3xl font-black italic mb-6">Mis <span class="header-gradient">Viajes</span></h1>
            <div id="lista-viajes" class="space-y-3"></div>
        </div>
    </div>

    <nav id="bottom-nav" class="hidden">
        <div onclick="showTab('home')" id="n-home" class="nav-btn active"><i class="fa-solid fa-compass text-xl block"></i><span class="text-[9px] font-bold">RESERVAR</span></div>
        <div onclick="showTab('hucha')" id="n-hucha" class="nav-btn"><i class="fa-solid fa-receipt text-xl block"></i><span class="text-[9px] font-bold">VIAJES</span></div>
        <div onclick="showTab('perfil')" id="n-perfil" class="nav-btn"><i class="fa-solid fa-user-gear text-xl block"></i><span class="text-[9px] font-bold">PERFIL</span></div>
    </nav>
</div>

<script>
    const S_URL = 'https://wdxtnvblolhqipscpxer.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndkeHRudmJsb2xocWlwc2NweGVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NzQxNzIsImV4cCI6MjA4ODA1MDE3Mn0.xO19SVN8gowDATLWDEpyakcZXbdGg2Iex8C-ZEWL2dM';
    const _supabase = supabase.createClient(S_URL, S_KEY);

    let currentUser = null, ultimoCalculo = null;
    let selectedPay = 'tarjeta', selectedRate = 'cerrado';
    let map, directionsService, directionsRenderer;
    let driverMarkers = []; // Almacena marcadores de conductores

    // --- SEGURIDAD Y PERSISTENCIA ---
    window.onload = async () => {
        const savedUser = localStorage.getItem('txmd_user');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            const { data, error } = await _supabase.from('clientes').select('*').eq('usuario', currentUser.usuario).single();
            if (data && !error) {
                currentUser = data;
                document.getElementById('bottom-nav').classList.remove('hidden');
                document.getElementById('app-header').classList.remove('hidden');
                showTab('home');
                actualizarUI();
                initMap();
            } else {
                cerrarSesion();
            }
        }
    };

    async function intentarAcceso() {
        const u = document.getElementById('user-login').value;
        const p = document.getElementById('pass-login').value;
        const { data, error } = await _supabase.from('clientes').select('*').eq('usuario', u).single();
        
        if (data && data.password === p) {
            currentUser = data;
            localStorage.setItem('txmd_user', JSON.stringify(data));
            document.getElementById('bottom-nav').classList.remove('hidden');
            document.getElementById('app-header').classList.remove('hidden');
            showTab('home');
            actualizarUI();
            initMap();
        } else {
            alert("Credenciales incorrectas");
        }
    }

    function cerrarSesion() {
        localStorage.removeItem('txmd_user');
        location.reload();
    }

    function actualizarUI() {
        document.getElementById('u-name').innerText = currentUser.nombre;
        document.getElementById('u-tc').innerText = (currentUser.taxcoins || 0).toFixed(2);
        document.getElementById('u-img').src = currentUser.foto || 'https://via.placeholder.com/150';
    }

    async function registrarUsuario() {
        const u = document.getElementById('reg-user').value;
        const p = document.getElementById('reg-pass').value;
        const n = document.getElementById('reg-nom').value;
        if(!u || !p || !n) return alert("Faltan datos");

        const userData = { 
            nombre: n, 
            apellido: document.getElementById('reg-ape').value,
            usuario: u, 
            password: p, 
            telefono: document.getElementById('reg-tel').value,
            foto: document.getElementById('img-preview').src,
            taxcoins: currentUser?.taxcoins || 0
        };

        const { error } = await _supabase.from('clientes').upsert([userData], { onConflict: 'usuario' });
        if(!error) {
            alert("¡Perfil actualizado!");
            localStorage.setItem('txmd_user', JSON.stringify(userData));
            if(!currentUser) toggleAuth('login'); else location.reload();
        }
    }

    // --- MAPA Y CONDUCTORES ---
    function initMap() {
        if(map) return;
        directionsService = new google.maps.DirectionsService();
        directionsRenderer = new google.maps.DirectionsRenderer({ polylineOptions: { strokeColor: "#39FF14", strokeWeight: 5 }});
        map = new google.maps.Map(document.getElementById('map'), { 
            center: {lat: 40.41, lng: -3.70}, zoom: 14, disableDefaultUI: true,
            styles: [{"elementType":"geometry","stylers":[{"color":"#212121"}]},{"elementType":"labels.text.fill","stylers":[{"color":"#757575"}]},{"featureType":"road","elementType":"geometry","stylers":[{"color":"#303030"}]}]
        });
        directionsRenderer.setMap(map);
        new google.maps.places.Autocomplete(document.getElementById('origin'));
        new google.maps.places.Autocomplete(document.getElementById('destination'));

        // Cargar conductores cada 5 segundos
        pintarDrivers();
        setInterval(pintarDrivers, 5000);
    }

    async function pintarDrivers() {
        const { data: driversData, error } = await _supabase
            .from('drivers')
            .select('nombre, latitud, longitud, marca_v')
            .eq('estado', 'activo');

        if (error) return console.error("Error drivers:", error);

        // Limpiar marcadores viejos
        driverMarkers.forEach(m => m.setMap(null));
        driverMarkers = [];

        if (driversData) {
            driversData.forEach(d => {
                if (d.latitud && d.longitud) {
                    const marker = new google.maps.Marker({
                        position: { lat: parseFloat(d.latitud), lng: parseFloat(d.longitud) },
                        map: map,
                        icon: {
                            url: 'https://cdn-icons-png.flaticon.com/512/3202/3202926.png',
                            scaledSize: new google.maps.Size(32, 32)
                        },
                        title: d.nombre
                    });
                    driverMarkers.push(marker);
                }
            });
        }
    }

    async function procesarViaje() {
        const o = document.getElementById('origin').value;
        const d = document.getElementById('destination').value;
        if(!o || !d) return alert("Indica origen y destino");

        if(!ultimoCalculo) {
            directionsService.route({ origin: o, destination: d, travelMode: 'DRIVING' }, (res, status) => {
                if(status === 'OK') {
                    directionsRenderer.setDirections(res);
                    const kms = res.routes[0].legs[0].distance.value / 1000;
                    const base = (5.50 + (kms * 1.40));
                    ultimoCalculo = base.toFixed(2);
                    document.getElementById('precio-txt').innerText = selectedRate === 'cerrado' ? ultimoCalculo + "€" : "TAXÍMETRO";
                    document.getElementById('info-resumen').classList.remove('hidden');
                    document.getElementById('btnAction').innerText = "CONFIRMAR RESERVA";
                }
            });
        } else {
            const { error } = await _supabase.from('viajes').insert([{
                cliente_id: currentUser.id,
                origen: o, destino: d, 
                precio: selectedRate === 'cerrado' ? parseFloat(ultimoCalculo) : 0,
                metodo_pago: selectedPay, tipo_tarifa: selectedRate,
                estado: 'pendiente'
            }]);
            if(!error) { alert("¡Reserva confirmada!"); showTab('hucha'); }
        }
    }

    function showTab(t) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('auth-screen').classList.add('hidden');
        if(t === 'home') { document.getElementById('main-app').classList.add('active'); document.getElementById('n-home').classList.add('active'); }
        else if(t === 'hucha') { document.getElementById('hucha-screen').classList.add('active'); document.getElementById('n-hucha').classList.add('active'); cargarHistorial(); }
        else if(t === 'perfil') { 
            const auth = document.getElementById('auth-screen');
            auth.classList.remove('hidden'); 
            auth.classList.add('as-profile'); 
            document.getElementById('btn-close-profile').classList.remove('hidden');
            document.getElementById('btn-logout').classList.remove('hidden');
            toggleAuth('register'); 
        }
    }

    async function cargarHistorial() {
        const { data } = await _supabase.from('viajes').select('*').eq('cliente_id', currentUser.id).order('created_at', {ascending: false});
        document.getElementById('lista-viajes').innerHTML = data.map(v => `
            <div class="trip-item">
                <div class="flex justify-between text-[10px] font-bold mb-2 uppercase">
                    <span class="text-[#00D1FF]">${v.tipo_tarifa}</span>
                    <span class="bg-[#222] px-2 py-1 rounded">${v.estado}</span>
                </div>
                <p class="text-[11px] truncate text-gray-400">📍 ${v.origen}</p>
                <p class="text-[11px] truncate text-gray-400">🏁 ${v.destino}</p>
                <p class="mt-2 font-black text-right text-[#39FF14] text-lg">${v.precio > 0 ? v.precio.toFixed(2)+'€' : 'TAXÍMETRO'}</p>
            </div>
        `).join('');
    }

    function toggleAuth(v) {
        document.getElementById('login-box').classList.toggle('hidden', v !== 'login');
        document.getElementById('register-box').classList.toggle('hidden', v !== 'register');
        if(v === 'register' && currentUser) {
            document.getElementById('reg-nom').value = currentUser.nombre;
            document.getElementById('reg-user').value = currentUser.usuario;
            document.getElementById('img-preview').src = currentUser.foto;
            document.getElementById('img-preview').classList.remove('hidden');
            document.getElementById('icon-cam').classList.add('hidden');
        }
    }

    function setOpt(type, val) {
        if(type === 'pay') {
            selectedPay = val;
            document.getElementById('pay-card').classList.toggle('active', val === 'tarjeta');
            document.getElementById('pay-cash').classList.toggle('active', val === 'efectivo');
        } else {
            selectedRate = val;
            ultimoCalculo = null;
            document.getElementById('rate-fixed').classList.toggle('active', val === 'cerrado');
            document.getElementById('rate-meter').classList.toggle('active', val === 'taximetro');
            document.getElementById('info-resumen').classList.add('hidden');
            document.getElementById('btnAction').innerText = "CALCULAR PRECIO";
        }
    }

    function obtenerUbicacionActual() {
        navigator.geolocation.getCurrentPosition((pos) => {
            const geocoder = new google.maps.Geocoder();
            geocoder.geocode({ location: { lat: pos.coords.latitude, lng: pos.coords.longitude } }, (results, status) => {
                if (status === "OK") document.getElementById('origin').value = results[0].formatted_address;
            });
        });
    }

    function previewImagen(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('img-preview').src = e.target.result;
                document.getElementById('img-preview').classList.remove('hidden');
                document.getElementById('icon-cam').classList.add('hidden');
            }
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDxdjJ1HyJoVgeP6NFoS2i4va-tdRjrJIA&libraries=places" async defer></script>
</body>
</html>
