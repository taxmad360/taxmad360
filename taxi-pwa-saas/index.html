<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TaxMad – TXMD Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* Variables de Marca TXMD */
        :root {
            --bg-color: #000000;
            --card-bg: #121212;
            --neon-green: #39FF14;
            --neon-blue: #00D1FF;
            --neon-purple: #BC00FF;
            --text-main: #ffffff;
            --border-radius: 16px;
        }

        body { 
            background: var(--bg-color); 
            font-family: "Montserrat", sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
            color: var(--text-main);
        }
        
        .mobile-container { 
            width: 100%; 
            max-width: 414px; 
            background: var(--bg-color); 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            box-shadow: 0 0 50px rgba(0,0,0,0.9); 
        }
        
        .screen { display: none; flex-direction: column; height: 100%; overflow-y: auto; padding-bottom: 100px; }
        .screen.active { display: flex; }

        /* Estilo para el Botón Principal */
        .btn-primary-txmd {
            background-color: var(--neon-green);
            color: #000000;
            font-weight: 800;
            text-transform: uppercase;
            border-radius: var(--border-radius);
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.4);
            transition: all 0.3s ease;
            padding: 18px;
            width: 100%;
            cursor: pointer;
        }
        .btn-primary-txmd:hover { transform: scale(1.02); box-shadow: 0 0 25px rgba(57, 255, 20, 0.6); }

        /* Tarjetas Estilo TXMD */
        .card-txmd {
            background-color: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--border-radius);
            padding: 20px;
            color: var(--text-main);
        }

        /* Cabecera con Degradado */
        .header-gradient {
            background: linear-gradient(90deg, var(--neon-purple) 0%, var(--neon-blue) 50%, var(--neon-green) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        /* Inputs Estilo Dark */
        .input-group label { display: block; font-size: 10px; font-weight: 800; color: var(--neon-blue); margin-bottom: 6px; text-transform: uppercase; }
        .input-group input { 
            width: 100%; padding: 14px 15px; border-radius: 14px; 
            background: #1a1a1a; border: 1px solid #333; color: white; font-size: 14px; outline: none; 
        }

        /* Navbar Inferior */
        nav { 
            position: fixed; bottom: 0; width: 100%; max-width: 414px; height: 85px; 
            background: #0a0a0a; border-top: 1px solid #222; display: flex; 
            justify-content: space-around; align-items: center; z-index: 6000; 
        }
        .nav-btn { color: #555; cursor: pointer; text-align: center; transition: 0.3s; }
        .nav-btn.active { color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green); }

        #auth-screen { 
            position: absolute; inset: 0; display: flex; flex-direction: column; 
            justify-content: center; padding: 40px; background: #000; color: white; z-index: 5000; text-align: center; 
        }
        .input-auth { 
            width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 12px; 
            border: 1px solid #333; background: #111; color: white; outline: none; 
        }

        #map { width: 100%; height: 220px; background: #111; border-radius: 20px; margin: 10px 0; border: 1px solid #333; }
        
        .opt-btn { 
            flex: 1; padding: 12px; border-radius: 14px; border: 1px solid #333; 
            background: #111; font-size: 10px; font-weight: 800; text-transform: uppercase; 
            text-align: center; cursor: pointer; color: #666; 
        }
        .opt-btn.active { border-color: var(--neon-blue); color: var(--neon-blue); box-shadow: 0 0 10px rgba(0, 209, 255, 0.3); }

        .trip-item { background: var(--card-bg); padding: 15px; border-radius: 16px; margin-bottom: 12px; border: 1px solid #222; }
    </style>
</head>
<body>

<div class="mobile-container">
    
    <header id="app-header" class="px-5 py-4 flex justify-between items-center border-b border-[#222] sticky top-0 bg-black z-40 hidden">
        <div class="flex items-center gap-3">
            <img id="u-img" src="" class="w-11 h-11 rounded-full border-2 border-[#BC00FF] object-cover bg-gray-900" onclick="showTab('perfil')">
            <div>
                <p class="text-[8px] font-black text-[#BC00FF] uppercase tracking-widest">Premium TXMD</p>
                <h2 id="u-name" class="text-sm font-bold text-white">...</h2>
            </div>
        </div>
        <div class="header-gradient text-xl">TaxMad</div>
    </header>

    <div id="auth-screen">
        <div id="auth-content">
            <div class="mb-10">
                <h1 class="text-4xl font-black italic header-gradient">TaxMad</h1>
                <p class="text-[10px] tracking-[4px] text-white opacity-50 uppercase">The Black Edition</p>
            </div>

            <div id="login-box">
                <input type="text" id="user-login" placeholder="Usuario" class="input-auth">
                <input type="password" id="pass-login" placeholder="Contraseña" class="input-auth">
                <button onclick="intentarAcceso()" class="btn-primary-txmd mt-4">ENTRAR</button>
                <p class="mt-6 text-sm text-gray-500">¿Nuevo aquí? <span class="text-[#00D1FF] font-bold cursor-pointer" onclick="toggleAuth('register')">Únete a TXMD</span></p>
            </div>

            <div id="register-box" class="hidden">
                <div class="w-24 h-24 rounded-full bg-[#111] border-2 border-[#BC00FF] mx-auto mb-6 flex items-center justify-center overflow-hidden" onclick="document.getElementById('reg-foto-input').click()">
                    <i class="fa-solid fa-camera text-2xl text-gray-600" id="icon-cam"></i>
                    <img id="img-preview" src="" class="hidden w-full h-full object-cover">
                </div>
                <input type="file" id="reg-foto-input" accept="image/*" class="hidden" onchange="previewImagen(this)">
                <input type="text" id="reg-nom" placeholder="Nombre" class="input-auth">
                <input type="text" id="reg-user" placeholder="Usuario" class="input-auth">
                <input type="password" id="reg-pass" placeholder="Contraseña" class="input-auth">
                <button onclick="registrarUsuario()" class="btn-primary-txmd">CREAR PERFIL</button>
                <p class="mt-4 text-xs text-gray-500 cursor-pointer" onclick="toggleAuth('login')">Volver</p>
            </div>
        </div>
    </div>

    <div id="main-app" class="screen">
        <div class="card-txmd mx-5 mt-6 flex justify-between items-center shadow-lg shadow-[#39FF1411]">
            <div>
                <p class="text-[10px] font-bold text-[#39FF14] uppercase mb-1">Taxcoins Balance</p>
                <p class="text-3xl font-black text-white"><span id="u-tc">0.00</span> <small class="text-xs text-gray-500">TC</small></p>
            </div>
            <i class="fa-solid fa-bolt-lightning text-3xl text-[#39FF14] opacity-80"></i>
        </div>

        <div class="px-5 mt-6 space-y-5">
            <div class="input-group">
                <label>Recogida</label>
                <input type="text" id="origin" placeholder="Origen">
            </div>
            <div class="input-group">
                <label>Destino</label>
                <input type="text" id="destination" placeholder="¿A dónde vamos?">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-black text-gray-500 block mb-2">PAGO</label>
                    <div class="option-selector flex gap-2">
                        <div id="pay-card" class="opt-btn active" onclick="setOpt('pay', 'tarjeta')">TARJETA</div>
                        <div id="pay-cash" class="opt-btn" onclick="setOpt('pay', 'efectivo')">EFECTIVO</div>
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-black text-gray-500 block mb-2">TARIFA</label>
                    <div class="option-selector flex gap-2">
                        <div id="rate-fixed" class="opt-btn active" onclick="setOpt('rate', 'cerrado')">FIXED</div>
                        <div id="rate-meter" class="opt-btn" onclick="setOpt('rate', 'taximetro')">METER</div>
                    </div>
                </div>
            </div>

            <div id="map"></div>
            
            <div id="info-resumen" class="hidden card-txmd text-center border-[#39FF1455]">
                <p id="label-precio" class="text-[10px] font-black text-[#00D1FF] uppercase">Tarifa TXMD</p>
                <span id="precio-txt" class="text-3xl font-black text-white">0.00€</span>
            </div>

            <button id="btnAction" class="btn-primary-txmd mb-10" onclick="procesarViaje()">CALCULAR VIAJE</button>
        </div>
    </div>

    <div id="hucha-screen" class="screen">
        <div class="p-6">
            <h1 class="text-3xl font-black italic mb-6 header-gradient">Historial <span class="text-white">TXMD</span></h1>
            <div id="lista-viajes" class="space-y-4"></div>
        </div>
    </div>

    <nav id="bottom-nav" class="hidden">
        <div onclick="showTab('home')" id="n-home" class="nav-btn active"><i class="fa-solid fa-map-location-dot text-xl block mb-1"></i><span class="text-[9px] font-bold">VIAJAR</span></div>
        <div onclick="showTab('hucha')" id="n-hucha" class="nav-btn"><i class="fa-solid fa-clock-rotate-left text-xl block mb-1"></i><span class="text-[9px] font-bold">REGISTROS</span></div>
        <div onclick="showTab('perfil')" id="n-perfil" class="nav-btn"><i class="fa-solid fa-user-astronaut text-xl block mb-1"></i><span class="text-[9px] font-bold">TXMD ID</span></div>
    </nav>
</div>

<script>
    // ... Tu lógica de Supabase y Google Maps permanece igual ...
    // Asegúrate de copiar las funciones: intentarAcceso, showTab, procesarViaje, etc.
    // del código original que me pasaste para mantener la funcionalidad.
</script>

</body>
</html>
