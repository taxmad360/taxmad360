<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LiveMad driver – Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #00B5FF; --dark: #001a3d; --card: #0a2551; }
        body { background: var(--dark); font-family: 'Montserrat', sans-serif; color: white; margin: 0; height: 100vh; display: flex; justify-content: center; overflow: hidden; }
        .mobile-container { width: 100%; max-width: 414px; background: var(--dark); position: relative; display: flex; flex-direction: column; height: 100vh; }
        
        .lm-input { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; outline: none; }
        .lm-btn-primary { background: linear-gradient(90deg, #38bdf8 0%, #4f46e5 100%); padding: 16px; border-radius: 12px; width: 100%; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s; }
        .lm-btn-primary:active { transform: scale(0.98); opacity: 0.9; }
        
        .job-card { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .address-box { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 10px; margin-bottom: 8px; font-size: 12px; display: flex; align-items: center; gap: 10px; }
        
        .ui-layer { position: relative; z-index: 10; pointer-events: none; }
        .interact { pointer-events: auto; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="mobile-container">
    
    <div id="auth-screen" class="flex flex-col justify-center p-10 h-full text-center ui-layer interact">
        <h1 class="text-4xl font-black mb-1">Live<span style="color:var(--blue)">Mad</span></h1>
        <p class="text-[10px] font-bold tracking-[3px] text-sky-400 mb-10 uppercase">driver Premium Panel</p>
        <input type="text" id="user-input" placeholder="Usuario" class="lm-input">
        <input type="password" id="pass-input" placeholder="Contraseña" class="lm-input">
        <button onclick="intentarLogin()" class="lm-btn-primary mt-4">ENTRAR AL SISTEMA</button>
    </div>

    <div id="main-app" class="hidden flex-col h-full relative">
        <header class="p-5 flex justify-between items-center bg-[#001a3d]/80 backdrop-blur-lg border-b border-white/5 ui-layer">
            <div class="flex items-center gap-3 interact">
                <div class="w-10 h-10 bg-sky-500 rounded-full flex items-center justify-center font-bold text-black" id="avatar-initial">A</div>
                <div>
                    <p class="text-[9px] text-gray-400 uppercase font-black">Conductor</p>
                    <p class="text-sm font-bold" id="display-name">---</p>
                </div>
            </div>
            <div id="status-tag" class="bg-green-500 text-black text-[9px] font-black px-3 py-1 rounded-full interact">CONECTADO</div>
        </header>

        <main class="flex-grow p-4 overflow-y-auto ui-layer interact">
            <div id="trip-list"></div>
        </main>

        <nav class="h-20 bg-[#0a2551]/90 backdrop-blur-md flex justify-around items-center border-t border-white/5 ui-layer">
            <div class="text-sky-400 text-center interact"><i class="fa-solid fa-map-location-dot text-xl"></i><p class="text-[9px] mt-1 font-bold">MAPA</p></div>
            <div class="text-gray-500 text-center interact"><i class="fa-solid fa-list-check text-xl"></i><p class="text-[9px] mt-1 font-bold">VIAJES</p></div>
            <div class="text-gray-500 text-center interact"><i class="fa-solid fa-wallet text-xl"></i><p class="text-[9px] mt-1 font-bold">CARTERA</p></div>
        </nav>
    </div>
</div>

<audio id="alert-snd" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<script>
    const S_URL = 'https://wdxtnvblolhqipscpxer.supabase.co
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndkeHRudmJsb2xocWlwc2NweGVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NzQxNzIsImV4cCI6MjA4ODA1MDE3Mn0.xO19SVN8gowDATLWDEpyakcZXbdGg2Iex8C-ZEWL2dM';
    const _supabase = supabase.createClient(S_URL, S_KEY);

    let gpsInterval = null;

    async function intentarLogin() {
        const u = document.getElementById('user-input').value;
        const p = document.getElementById('pass-input').value;

        const { data: d } = await _supabase.from('drivers').select('*').eq('usuario', u).single();

        if (d && d.acceso_bloqueado) {
            alert("⚠️ Tu acceso está PAUSADO. Contacta con administración.");
            return;
        }

        if((u === 'admin' || u === 'driver1') && p === '1234') {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('display-name').innerText = u;
            document.getElementById('avatar-initial').innerText = u[0].toUpperCase();
            iniciarRealtime();
        } else {
            alert("Acceso incorrecto.");
        }
    }

    function iniciarRealtime() {
        _supabase.channel('viajes-live').on('postgres_changes', { event: '*', table: 'viajes' }, payload => {
            if(payload.eventType === 'INSERT') document.getElementById('alert-snd').play();
            cargarViajes();
        }).subscribe();
        cargarViajes();
    }

    async function cargarViajes() {
        const { data } = await _supabase.from('viajes')
            .select('*')
            .or('estado.eq.pendiente,estado.eq.aceptado,estado.eq.en_punto,estado.eq.en_curso')
            .order('created_at', { ascending: false });

        const container = document.getElementById('trip-list');
        if (!data || data.length === 0) {
            container.innerHTML = '<div class="text-center py-20 opacity-30"><i class="fa-solid fa-satellite-dish text-5xl mb-4"></i><p class="text-xs font-bold uppercase tracking-widest">Buscando viajes...</p></div>';
            return;
        }

        container.innerHTML = data.map(trip => `
            <div class="job-card">
                <div class="flex justify-between items-start mb-4">
                    <span class="bg-sky-400 text-black text-[9px] font-black px-2 py-1 rounded uppercase">${trip.estado.replace('_', ' ')}</span>
                    <span class="text-2xl font-black">${trip.precio}€</span>
                </div>
                <div class="address-box"><i class="fa-solid fa-circle text-sky-400"></i><span class="truncate">${trip.origen}</span></div>
                <div class="address-box"><i class="fa-solid fa-location-dot text-gray-500"></i><span class="truncate">${trip.destino}</span></div>
                <div class="bg-white/5 p-3 rounded-lg mb-4 text-[11px]">
                    <i class="fa-solid fa-user text-sky-400"></i> Cliente: <strong>${trip.cliente_nombre}</strong>
                </div>
                ${renderBotonAccion(trip)}
            </div>
        `).join('');
    }

    function renderBotonAccion(trip) {
        if (trip.estado === 'pendiente') {
            return `<button onclick="actualizarViaje('${trip.id}', 'aceptado')" class="lm-btn-primary py-3 text-xs">ACEPTAR SERVICIO</button>`;
        } else if (trip.estado === 'aceptado') {
            return `<button onclick="actualizarViaje('${trip.id}', 'en_punto')" class="lm-btn-primary py-3 text-xs" style="background: #10b981;">HE LLEGADO</button>`;
        } else if (trip.estado === 'en_punto') {
            return `<button onclick="actualizarViaje('${trip.id}', 'en_curso')" class="lm-btn-primary py-3 text-xs" style="background: #8b5cf6;">CONTINUAR VIAJE</button>`;
        } else if (trip.estado === 'en_curso') {
            return `<button onclick="actualizarViaje('${trip.id}', 'finalizado')" class="lm-btn-primary py-3 text-xs" style="background: #ef4444;">FINALIZAR SERVICIO</button>`;
        }
    }

    async function actualizarViaje(id, nuevoEstado) {
        // Lógica financiera si finaliza
        if (nuevoEstado === 'finalizado') {
            const { data: v } = await _supabase.from('viajes').select('*').eq('id', id).single();
            const usuario = document.getElementById('display-name').innerText;
            const { data: d } = await _supabase.from('drivers').select('*').eq('usuario', usuario).single();
            
            await _supabase.from('drivers').update({
                total_dinero_generado: (d.total_dinero_generado || 0) + v.precio,
                comision_pendiente_10: (d.comision_pendiente_10 || 0) + (v.precio * 0.10)
            }).eq('id', d.id);
            detenerSeguimientoGPS();
        }

        const { error } = await _supabase.from('viajes').update({ estado: nuevoEstado }).eq('id', id);
        
        if(!error) {
            if(nuevoEstado === 'aceptado') iniciarSeguimientoGPS(id, 300000); // 5 min
            if(nuevoEstado === 'en_curso') iniciarSeguimientoGPS(id, 10000);  // 10 seg
            cargarViajes();
        }
    }

    function iniciarSeguimientoGPS(tripId, intervalo) {
        if (gpsInterval) clearInterval(gpsInterval);
        gpsInterval = setInterval(() => {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                await _supabase.from('viajes').update({ 
                    driver_lat: pos.coords.latitude, 
                    driver_lng: pos.coords.longitude 
                }).eq('id', tripId);
            });
        }, intervalo);
    }

    function detenerSeguimientoGPS() {
        if (gpsInterval) clearInterval(gpsInterval);
    }
</script>
</body>
</html>
