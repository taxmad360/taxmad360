<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>TaxMad — App Móvil</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00B5FF">
<link rel="apple-touch-icon" href="icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
  :root{
    --blue:#00B5FF;
    --dark:#112F5C;
    --green:#6DD5A9;
    --violet:#7A5FFF;
    --bg-app:#ffffff;
    --muted:#8898aa;
    --radius:16px;
  }

  html, body {
    min-height: 100%; margin: 0; font-family: "Montserrat", sans-serif;
    background: #eef2f6; display: flex; justify-content: center;
    padding: 40px 0; box-sizing: border-box;
  }

  .mobile-container {
    width: 100%; max-width: 400px; background: var(--bg-app);
    min-height: 800px; height: auto; border-radius: 30px;
    box-shadow: 0 0 0 12px #112F5C, 0 30px 60px rgba(0,0,0,0.2);
    overflow: hidden; position: relative; display: flex; flex-direction: column;
  }

  @media (max-width: 450px) {
    html, body { background: #fff; padding: 0; display: block; height: auto; }
    .mobile-container { max-width: 100%; min-height: 100vh; border-radius: 0; box-shadow: none; border: none; }
  }

  .app-header {
    background: #fff; padding: 20px 24px; display: flex; justify-content: space-between; align-items: center;
    position: sticky; top: 0; z-index: 50; border-bottom: 1px solid #f4f6f9;
  }
  .app-title { font-weight: 800; font-size: 20px; color: var(--dark); }
  .app-subtitle { font-size: 11px; font-weight: 700; color: var(--blue); background: rgba(0,181,255,0.08); padding: 5px 10px; border-radius: 20px; }

  .content-body { flex: 1; padding: 24px; display: flex; flex-direction: column; gap: 20px; }

  label { display: block; font-weight: 700; font-size: 12px; color: var(--dark); margin-bottom: 8px; margin-left: 4px; }
  
  .input-wrapper { position: relative; }
  .input-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none;}
  
  input {
    width: 100%; padding: 16px 16px 16px 45px;
    border-radius: 14px; border: 1px solid #edf2f7;
    background: #f9fafb; font-size: 15px; font-family: inherit; outline: none;
    box-sizing: border-box; transition: all 0.2s ease; color: var(--dark);
  }
  input:focus { border-color: var(--blue); background: #fff; box-shadow: 0 4px 15px rgba(0,181,255,0.08); }
  input.input-error { border-color: #ff4d4d; background: #fff5f5; }

  .form-group { margin-bottom: 15px; position: relative; }
  
  .btn-location {
    position: absolute; right: 12px; top: 34px; background: none; border: none;
    cursor: pointer; color: var(--blue); padding: 5px; z-index: 5;
    transition: transform 0.2s;
  }
  .btn-location:hover { transform: scale(1.1); }
  
  .fa-spin-fast { animation: fa-spin 1s infinite linear; }

  .row-2 { display: flex; gap: 12px; }
  .row-2 > div { flex: 1; }

  #map { width: 100%; height: 200px; border-radius: 18px; margin-top: 10px; border: 1px solid #edf2f7; }

  .btn {
    width: 100%; padding: 16px; border: none; border-radius: 14px;
    font-weight: 700; font-size: 15px; cursor: pointer; transition: transform 0.1s, opacity 0.2s;
    display: flex; justify-content: center; align-items: center; gap: 10px;
  }
  .btn-calc { background: linear-gradient(135deg, #00B5FF 0%, #7A5FFF 100%); color: #fff; }
  .btn-book { background: var(--dark); color: #fff; margin-top: 15px; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

  #resultadoCard {
    display: none; background: #f4f9ff; border-radius: 20px; padding: 20px;
    border: 1px solid #e0eeff; animation: slideUp 0.4s ease-out;
  }
  @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

  .price-tag { font-size: 32px; font-weight: 900; color: var(--dark); text-align: center; margin: 10px 0; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 15px 0; }
  .stat-box { background: #fff; padding: 10px 5px; border-radius: 12px; text-align: center; border: 1px solid #eee; }
  .stat-label { font-size: 8px; font-weight: 800; color: var(--muted); display: block; text-transform: uppercase; }
  .stat-val { font-size: 13px; font-weight: 800; color: var(--dark); }

  #notif { display: none; padding: 15px; border-radius: 12px; margin-top: 15px; text-align: center; font-size: 13px; font-weight: 700; }
  .divider { height: 1px; background: #f0f0f0; margin: 10px 0; }
  
  .small-note {
    font-size: 11px; color: #8898aa; text-align: center; margin-top: 20px; line-height: 1.5;
  }
</style>
</head>
<body>

<div class="mobile-container">
  
  <header class="app-header">
    <div class="app-title">TaxMad</div>
    <div class="app-subtitle">PRECIO CERRADO</div>
  </header>

  <div class="content-body">
    
    <div>
      <label style="font-size:16px; margin-bottom:15px; color:var(--dark);">Calcula tu ruta</label>
      
      <div class="form-group">
        <label>RECOGIDA</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-location-dot input-icon"></i>
          <input id="origen" type="text" placeholder="Calle, número, ciudad...">
        </div>
        <button class="btn-location" onclick="obtenerUbicacionActual()" title="Usar mi ubicación">
          <i id="iconGps" class="fa-solid fa-crosshairs fa-lg"></i>
        </button>
      </div>

      <div class="form-group">
        <label>DESTINO</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-flag-checkered input-icon"></i>
          <input id="destino" type="text" placeholder="Dirección de destino">
        </div>
      </div>
      
      <div class="row-2">
        <div>
           <label>FECHA Y HORA</label>
           <div class="input-wrapper">
             <i class="fa-solid fa-calendar-days input-icon"></i>
             <input id="fechaHora" type="datetime-local">
           </div>
        </div>
      </div>

      <div id="map"></div>

      <div class="btn-group" style="margin-top:15px;">
        <button class="btn btn-calc" id="btnCalcular" onclick="calcularPrecio()">
          <span>VER PRECIO</span>
          <i class="fa-solid fa-calculator"></i>
        </button>
      </div>
    </div>

    <div class="divider"></div>

    <div>
      <label style="margin-bottom:10px;">Datos de contacto</label>
      <div class="form-group">
        <div class="input-wrapper">
          <i class="fa-solid fa-user input-icon"></i>
          <input id="nombre" type="text" placeholder="Tu Nombre">
        </div>
      </div>
      <div class="row-2">
        <div class="input-wrapper">
          <i class="fa-solid fa-mobile-screen input-icon"></i>
          <input id="telefono" type="tel" placeholder="Móvil" maxlength="15">
        </div>
        <div class="input-wrapper">
           <i class="fa-solid fa-envelope input-icon"></i>
           <input id="correo" type="email" placeholder="Email">
        </div>
      </div>
    </div>

    <div id="resultadoCard">
      <div class="result-header">
        <div style="font-size:11px; font-weight:800; color:var(--muted); letter-spacing:1px;">ESTIMACIÓN</div>
        <div id="tarifaText" style="font-size:10px; font-weight:700; background:#fff; color:var(--blue); padding:4px 8px; border-radius:6px;">--</div>
      </div>
      
      <div class="price-tag" id="precio">0.00€</div>
      
      <div class="stats-grid">
        <div class="stat-box"><span class="stat-label">TIEMPO</span><span class="stat-val" id="duracion">--</span></div>
        <div class="stat-box"><span class="stat-label">DISTANCIA</span><span class="stat-val" id="distancia">--</span></div>
        <div class="stat-box"><span class="stat-label">TARIFA</span><span class="stat-val" id="tarifa">FIJA</span></div>
      </div>

      <button type="button" class="btn btn-book" id="btnReservar" style="width:100%; margin-top:10px;" onclick="reservarAhora()">
        <span>PEDIR TAXI AHORA</span>
        <i class="fa-solid fa-taxi"></i>
      </button>
    </div>

    
    <div id="notif"></div>
    <div class="small-note">Antelación mínima de <strong>30 minutos</strong>. Reserva con la máxima antelación posible.</div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    establecerFechaMinima();
});

function establecerFechaMinima() {
    const now = new Date();
    now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
    document.getElementById('fechaHora').min = now.toISOString().slice(0,16);
}

let map, directionsService, directionsRenderer, autocompleteOrigen, autocompleteDestino;
let ultimoCalculo = null;

function determinarTarifa(fechaHoraStr) {
    const fecha = new Date(fechaHoraStr);
    const diaSemana = fecha.getDay(); 
    const hora = fecha.getHours();
    const BASE = 6.00;
    let PRECIO_KM;
    let TARIFA_NOMBRE;

    if (diaSemana === 0 || diaSemana === 6) {
        PRECIO_KM = 1.60;
        TARIFA_NOMBRE = "Fin de Semana";
    } else {
        if (hora >= 7 && hora < 21) {
            PRECIO_KM = 1.40;
            TARIFA_NOMBRE = "Diurna (L-V)";
        } else {
            PRECIO_KM = 1.60;
            TARIFA_NOMBRE = "Nocturna (L-V)";
        }
    }
    return { BASE, PRECIO_KM, TARIFA_NOMBRE };
}

function mostrarNotificacion(msg,tipo='success'){
  const n=document.getElementById('notif');
  n.innerHTML = tipo === 'success' ? `<i class="fa-solid fa-circle-check"></i> ${msg}` : `<i class="fa-solid fa-circle-exclamation"></i> ${msg}`;
  n.style.display='block';
  n.style.background=tipo==='error'?'#fee2e2':'#e6fffa';
  n.style.color=tipo==='error'?'#991b1b':'#047857';
  n.style.border=tipo==='error'?'1px solid #fecaca':'1px solid #ccfbf1';
  
  if(tipo === 'error') n.scrollIntoView({behavior: "smooth", block: "center"});
  
  setTimeout(()=>n.style.display='none',5000);
}

function obtenerUbicacionActual() {
  if (navigator.geolocation) {
    const inputOrigen = document.getElementById('origen');
    const iconGps = document.getElementById('iconGps');
    
    inputOrigen.placeholder = "Localizando...";
    iconGps.classList.remove('fa-crosshairs');
    iconGps.classList.add('fa-spinner', 'fa-spin-fast');

    navigator.geolocation.getCurrentPosition(
      (position) => {
        const pos = { lat: position.coords.latitude, lng: position.coords.longitude };
        const geocoder = new google.maps.Geocoder();
        
        geocoder.geocode({ location: pos }, (results, status) => {
            iconGps.classList.remove('fa-spinner', 'fa-spin-fast');
            iconGps.classList.add('fa-crosshairs');

          if (status === "OK" && results[0]) {
              inputOrigen.value = results[0].formatted_address;
              map.setCenter(pos);
              map.setZoom(16);
          } else {
              mostrarNotificacion("No pudimos encontrar tu dirección exacta", "error");
          }
          inputOrigen.placeholder = "Dirección de recogida";
        });
      },
      () => {
        iconGps.classList.remove('fa-spinner', 'fa-spin-fast');
        iconGps.classList.add('fa-crosshairs');
        mostrarNotificacion("Error: Activa el GPS de tu móvil", "error");
        inputOrigen.placeholder = "Dirección de recogida";
      }
    );
  } else {
    mostrarNotificacion("Tu navegador no soporta geolocalización", "error");
  }
}

function initMap(){
  const center={lat:40.4168,lng:-3.7038};
  map=new google.maps.Map(document.getElementById('map'),{
      center, zoom:13, disableDefaultUI:true, gestureHandling: "cooperative" 
  });
  directionsService=new google.maps.DirectionsService();
  directionsRenderer=new google.maps.DirectionsRenderer({map,polylineOptions:{strokeColor:'#00B5FF',strokeWeight:5}});
  
  const options = { componentRestrictions: { country: "es" } };
  autocompleteOrigen=new google.maps.places.Autocomplete(document.getElementById('origen'), options);
  autocompleteDestino=new google.maps.places.Autocomplete(document.getElementById('destino'), options);
}

function calcularPrecio(){
  document.querySelectorAll('input').forEach(i => i.classList.remove('input-error'));

  const origen=document.getElementById('origen').value.trim();
  const destino=document.getElementById('destino').value.trim();
  const fechaHora = document.getElementById('fechaHora').value.trim();

  let hayError = false;
  if(!origen) { document.getElementById('origen').classList.add('input-error'); hayError=true; }
  if(!destino) { document.getElementById('destino').classList.add('input-error'); hayError=true; }
  if(!fechaHora) { document.getElementById('fechaHora').classList.add('input-error'); hayError=true; }

  if(hayError){ mostrarNotificacion('Por favor, rellena todos los campos de la ruta','error'); return; }

  const fechaSeleccionada = new Date(fechaHora);
  const ahora = new Date();
  if (fechaSeleccionada < ahora) {
      mostrarNotificacion('La fecha no puede ser en el pasado', 'error');
      document.getElementById('fechaHora').classList.add('input-error');
      return;
  }

  const { BASE, PRECIO_KM, TARIFA_NOMBRE } = determinarTarifa(fechaHora);
  
  const btn=document.getElementById('btnCalcular');
  const originalHtml = btn.innerHTML;
  btn.disabled=true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> CALCULANDO...';

  directionsService.route({origin:origen,destination:destino,travelMode:'DRIVING'},(result,status)=>{
    btn.disabled=false;
    btn.innerHTML=originalHtml;
    
    if(status!=='OK'){
        mostrarNotificacion('No se encontró ruta. Verifica las direcciones.','error');
        return;
    }
    
    directionsRenderer.setDirections(result);

    const leg=result.routes[0].legs[0];
    const km=leg.distance.value/1000;
    const duracionMin=Math.round(leg.duration.value/60);
    const precio = BASE + km * PRECIO_KM;

    ultimoCalculo = { km, duracionMin, precio, TARIFA_NOMBRE };

    document.getElementById('precio').textContent=precio.toFixed(2)+' €';
    document.getElementById('duracion').textContent=duracionMin+' min';
    document.getElementById('distancia').textContent=km.toFixed(2)+' km';
    document.getElementById('tarifaText').textContent = TARIFA_NOMBRE;
    
    const resCard = document.getElementById('resultadoCard');
    resCard.style.display='block';
    
    setTimeout(() => {
        resCard.scrollIntoView({behavior: "smooth", block: "center"});
    }, 100);
  });
}

async function reservarAhora(){
  if(!ultimoCalculo){mostrarNotificacion('Primero debes calcular la ruta','error');return;}

  document.querySelectorAll('input').forEach(i => i.classList.remove('input-error'));

  const nombre=document.getElementById('nombre').value.trim();
  const correo=document.getElementById('correo').value.trim();
  const telefono=document.getElementById('telefono').value.trim();
  const fechaHora=document.getElementById('fechaHora').value.trim();
  const origen=document.getElementById('origen').value.trim();
  const destino=document.getElementById('destino').value.trim();

  let hayError = false;
  if(!nombre){ document.getElementById('nombre').classList.add('input-error'); hayError=true; }
  if(!correo){ document.getElementById('correo').classList.add('input-error'); hayError=true; }
  
  const phoneRegex = /^[0-9]{9,15}$/;
  if(!telefono || !phoneRegex.test(telefono.replace(/\s/g, ''))){ 
      document.getElementById('telefono').classList.add('input-error'); 
      mostrarNotificacion('Introduce un teléfono válido (mínimo 9 dígitos)', 'error');
      return; 
  }

  if(hayError){
    mostrarNotificacion('Completa tus datos de contacto correctamente','error');
    return;
  }

  const btn=document.getElementById('btnReservar');
  const originalHtml = btn.innerHTML;
  btn.disabled=true;
  btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> PROCESANDO...';

  // --- FUTURA CONEXIÓN CON LA BASE DE DATOS EN TIEMPO REAL ---
  // Aquí es donde enviaremos los datos a Firebase/Supabase en lugar de un email.
  // Por ahora, simulamos un retraso de red de 2 segundos para probar la interfaz.
  
  setTimeout(() => {
    mostrarNotificacion('¡Buscando conductor cercano!... (Simulado)','success');
    
    // Reset visual
    document.getElementById('resultadoCard').style.display='none';
    document.getElementById('nombre').value='';
    document.getElementById('telefono').value='';
    document.getElementById('correo').value='';
    ultimoCalculo=null;
    
    // Reset botón
    btn.disabled=false;
    btn.innerHTML = originalHtml;
    
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, 2000);
}
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDxdjJ1HyJoVgeP6NFoS2i4va-tdRjrJIA&libraries=places&callback=initMap" async defer></script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('Service Worker registrado con éxito', reg))
        .catch(err => console.warn('Error al registrar el Service Worker', err));
    });
  }
</script>

</body>
</html>
